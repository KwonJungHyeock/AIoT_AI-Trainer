<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="/favicon.png" />
<meta name="theme-color" content="#0a0b12" />
<title>입장 · VISION AI</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#0a0b12;--bg-2:#0f1120;--ink:#f2f4fb;--ink-2:#aeb6cf;--ink-3:#737c9c;
    --line:rgba(255,255,255,.10);--line-2:rgba(255,255,255,.16);--panel:rgba(255,255,255,.045);
    --acc:#3b86ff;--acc-2:#6aa6ff;--acc-soft:rgba(59,134,255,.18);--green:#42e29b;
    --mono:'JetBrains Mono',ui-monospace,monospace; }
  *{box-sizing:border-box;} html,body{margin:0;height:100%;}
  body{font-family:'Pretendard',system-ui,sans-serif;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;
    word-break:keep-all;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}
  a{color:inherit;text-decoration:none;} button{font-family:inherit;cursor:pointer;}
  .ambient{position:fixed;inset:0;z-index:0;pointer-events:none;transition:background .5s;
    background:radial-gradient(60% 60% at 50% 16%,var(--glow,var(--acc-soft)),transparent 60%),linear-gradient(180deg,var(--bg-2),var(--bg));}
  .scanlines{position:fixed;inset:0;z-index:40;pointer-events:none;opacity:.28;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0 1px,transparent 1px 3px);}
  .hud{position:relative;z-index:6;display:flex;align-items:center;justify-content:space-between;padding:16px 26px;gap:14px;flex:none;}
  .brand{display:flex;align-items:center;gap:11px;} .brand img{height:27px;}
  .brand .t{font-size:15px;font-weight:800;} .brand .t span{color:#f0473a;}
  .brand .sys{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.16em;color:var(--ink-3);}
  .brand .sep{width:1px;height:16px;background:var(--line-2);}
  .hbtn{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--ink-2);
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 12px;transition:.15s;}
  .hbtn:hover{color:var(--ink);border-color:var(--acc-2);}
  [data-ic]{display:inline-flex;align-items:center;justify-content:center;line-height:0;} [data-ic] svg{width:1em;height:1em;display:block;} .hbtn [data-ic]{font-size:14px;}
  .stage{position:relative;z-index:5;flex:1;display:flex;flex-direction:column;align-items:center;min-height:0;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--ink-3);text-transform:uppercase;margin:6px 0 2px;}
  .title{font-size:27px;font-weight:800;letter-spacing:-.02em;margin:6px 0 2px;text-shadow:0 2px 26px rgba(59,134,255,.35);}
  .title b{color:var(--acc-2);}
  /* 캐러셀 */
  .carousel{position:relative;width:100%;flex:1;min-height:0;}
  .track{position:absolute;inset:0;}
  .pack{position:absolute;top:50%;left:50%;width:min(470px,84vw);aspect-ratio:3/4;
    transform:translate(calc(-50% + var(--off,0)*var(--gap,450px)),-50%) scale(var(--sc,.82));
    opacity:var(--op,0);z-index:var(--z,1);transition:transform .5s cubic-bezier(.2,.7,.2,1),opacity .5s;
    border:0;padding:0;background:none;pointer-events:var(--pe,none);}
  .pi{position:relative;width:100%;height:100%;border-radius:18px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6);transition:box-shadow .4s;}
  .pack.center{cursor:pointer;}
  .pack.center .pi{box-shadow:0 40px 110px rgba(0,0,0,.72);}
  .pack.center:hover .pi{box-shadow:0 46px 120px rgba(0,0,0,.78);}
  .pa{position:absolute;inset:0;background:radial-gradient(120% 75% at 30% 12%,var(--c1),transparent 60%),linear-gradient(165deg,var(--c2),#0c1120);}
  .pa::after{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.5) 1px,transparent 1px);background-size:18px 18px;opacity:.05;}
  .pthumb{position:absolute;inset:0;z-index:1;width:100%;height:100%;object-fit:cover;}
  .pscrim{position:absolute;inset:0;z-index:2;background:linear-gradient(180deg,rgba(8,9,15,.1) 28%,rgba(8,9,15,.55) 60%,rgba(8,9,15,.95) 100%);}
  .pb{position:absolute;inset:0;z-index:3;padding:28px;display:flex;flex-direction:column;}
  .pno{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.6);}
  .pb .nm{margin-top:auto;font-size:29px;font-weight:800;letter-spacing:-.02em;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.65);}
  .pb .ds{font-size:14px;line-height:1.55;color:rgba(255,255,255,.84);margin-top:8px;text-shadow:0 1px 8px rgba(0,0,0,.6);}
  .arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:8;width:auto;height:auto;padding:14px;border:0;background:none;
    color:rgba(255,255,255,.45);font-size:46px;line-height:0;font-weight:300;transition:color .15s, transform .15s;}
  .arrow:hover{color:#fff;}
  .arrow.l{left:max(6px,2vw);} .arrow.l:hover{transform:translateY(-50%) translateX(-3px);}
  .arrow.r{right:max(6px,2vw);} .arrow.r:hover{transform:translateY(-50%) translateX(3px);}
  .foot{position:relative;z-index:6;flex:none;display:flex;flex-direction:column;align-items:center;gap:12px;padding:6px 20px 24px;}
  .go{display:inline-flex;align-items:center;gap:9px;font-size:18px;font-weight:800;letter-spacing:.01em;color:#fff;
    padding:6px 4px;border:0;background:none;cursor:pointer;transition:gap .15s, color .15s;}
  .go .ar{color:var(--c,var(--acc-2));font-weight:400;font-size:20px;transition:transform .15s;}
  .go:hover{gap:13px;} .go:hover .ar{transform:translateX(3px);}
  .dots{display:flex;gap:7px;} .dots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22);transition:.2s;cursor:pointer;}
  .dots i.on{background:#fff;width:20px;border-radius:99px;}
  .hint{font-size:11.5px;color:var(--ink-3);letter-spacing:.01em;}
  /* 모달 */
  .ov{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;padding:22px;background:rgba(5,6,12,.74);backdrop-filter:blur(6px);}
  .ov.on{display:flex;}
  .modal.wide{width:min(640px,100%);}
  .modal{position:relative;width:min(460px,100%);max-height:90vh;overflow:auto;background:linear-gradient(180deg,#12162a,#0d1020);
    border:1px solid rgba(59,134,255,.32);border-radius:20px;padding:24px;box-shadow:0 0 0 4px rgba(59,134,255,.14),0 30px 70px rgba(0,0,0,.6);}
  .modal h2{margin:0 0 4px;font-size:19px;font-weight:800;} .modal .sub{margin:0 0 16px;font-size:12.5px;color:var(--ink-3);}
  .x{position:absolute;top:15px;right:15px;width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--ink-2);font-size:14px;}
  .lbl{display:block;font-size:12.5px;color:var(--ink-2);font-weight:600;margin:0 0 6px;}
  .in{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--line-2);border-radius:10px;color:var(--ink);font-size:15px;font-family:inherit;padding:11px 12px;margin-bottom:13px;}
  .in:focus{outline:none;border-color:var(--acc-2);}
  .btn{width:100%;font-size:15px;font-weight:800;color:#fff;border:0;border-radius:12px;padding:13px;background:linear-gradient(135deg,var(--acc-2),var(--acc));box-shadow:0 8px 22px rgba(59,134,255,.34);}
  .btn.ghost{color:var(--ink-2);background:rgba(255,255,255,.05);border:1px solid var(--line-2);box-shadow:none;}
  .row{display:flex;gap:9px;}
  .codebig{font-family:var(--mono);font-size:38px;font-weight:700;letter-spacing:.12em;color:var(--acc-2);text-align:center;
    background:rgba(59,134,255,.1);border:1px dashed rgba(59,134,255,.4);border-radius:14px;padding:18px;margin:6px 0 16px;}
  .clist{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-height:300px;overflow:auto;margin-bottom:16px;padding:2px;}
  .citem{display:flex;flex-direction:column;align-items:flex-start;gap:5px;text-align:left;background:rgba(255,255,255,.05);border:0;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);border-radius:14px;padding:16px 16px;cursor:pointer;transition:.15s;min-height:78px;justify-content:center;}
  .citem:hover{background:rgba(255,255,255,.09);}
  .citem.sel{background:var(--acc-soft);box-shadow:inset 0 0 0 2px var(--acc-2);}
  .citem .cn{font-weight:800;font-size:15px;color:#fff;}
  .citem .cm{font-size:11.5px;color:var(--ink-3);}
  @media(max-width:520px){ .clist{grid-template-columns:1fr;} }
  .cl-empty{color:var(--ink-3);font-size:12.5px;text-align:center;padding:18px 0;}
  @media(max-width:560px){ .title{font-size:22px;} .arrow{width:40px;height:40px;} }
</style>
</head>
<body>
<div class="ambient" id="ambient"></div>
<div class="scanlines"></div>

<header class="hud">
  <a class="brand" href="/platform/index.html">
    <img src="/platform/img/logo-mark.webp" alt="Eduino AI" />
    <span class="t">Eduino <span>AI</span></span><span class="sep"></span><span class="sys">VISION&nbsp;AI</span>
  </a>
  <a class="hbtn" href="/platform/index.html"><i data-ic="home"></i> 플랫폼 홈</a>
</header>

<main class="stage">
  <div class="eyebrow">VISION AI · START</div>
  <h1 class="title">어떻게 <b>시작</b>할까요?</h1>
  <div class="carousel">
    <button class="arrow l" id="prev">‹</button>
    <div class="track" id="track"></div>
    <button class="arrow r" id="next">›</button>
  </div>
</main>

<footer class="foot">
  <button class="go" id="go"><span class="gt">체험 시작</span> <span class="ar">→</span></button>
  <div class="dots" id="dots"></div>
  <div class="hint">포스터 클릭 · <b style="color:var(--ink-2)">← →</b> 넘기기 · Enter 시작</div>
</footer>

<!-- 수업 만들기 모달 -->
<div class="ov" id="createOv">
  <div class="modal" id="createCard"></div>
</div>
<!-- 수업 참여 모달 -->
<div class="ov" id="joinOv">
  <div class="modal wide" id="joinCard"></div>
</div>

<script src="/stages/icons.js"></script>
<script src="/stages/session.js"></script>
<script src="/stages/cert.js"></script>
<script src="/stages/board.js"></script>
<script>
  const $=(id)=>document.getElementById(id);
  const esc=(s)=>(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
  const ROLES=[
    { key:'free', nm:'체험 모드', ds:'코드 없이 자유롭게 둘러봐요. 결과는 이미지로 저장됩니다.', tag:'MODE · 누구나 · 코드 불필요',
      c:'#6aa6ff', c1:'rgba(59,134,255,.5)', c2:'#15233f', glow:'rgba(59,134,255,.18)' },
    { key:'create', nm:'수업 개설', ds:'교사용. 수업명·인원을 설정하면 입장 코드가 발급됩니다.', tag:'TEACHER · 수업 만들기',
      c:'#ff8472', c1:'rgba(240,71,58,.5)', c2:'#2a1410', glow:'rgba(240,71,58,.16)' },
    { key:'join', nm:'수업 참여', ds:'학생용. 선생님이 만든 수업을 찾아 코드로 입장합니다.', tag:'STUDENT · 코드 입력',
      c:'#42e29b', c1:'rgba(66,226,155,.45)', c2:'#0e2a22', glow:'rgba(66,226,155,.15)' },
  ];
  const track=$('track');
  track.innerHTML=ROLES.map((r,i)=>`
    <button class="pack" data-i="${i}" style="--c:${r.c};--c1:${r.c1};--c2:${r.c2}">
      <div class="pi">
        <div class="pa"></div>
        <img class="pthumb" data-base="/platform/img/entry-${r.key}" alt="" decoding="async" />
        <div class="pscrim"></div>
        <div class="pb"><div class="pno">${r.tag}</div><div class="nm">${r.nm}</div><div class="ds">${r.ds}</div></div>
      </div>
    </button>`).join('');
  const packs=[...track.querySelectorAll('.pack')];
  /* 실사 포스터 로더 — webp→jpg→png, 없으면 그라데이션 폴백 */
  packs.forEach(p=>{ const img=p.querySelector('.pthumb'); if(!img) return;
    const base=img.dataset.base, exts=['webp','jpg','png','jpeg']; let k=0;
    const next=()=>{ if(k>=exts.length){ img.remove(); return; } img.src=base+'.'+exts[k++]; };
    img.addEventListener('error',next); next(); });
  $('dots').innerHTML=ROLES.map((_,i)=>`<i data-i="${i}"></i>`).join('');
  const dots=[...$('dots').querySelectorAll('i')];
  let cur=0;
  function gap(){ return Math.min(430,window.innerWidth*0.42); }
  function render(){
    const g=gap();
    packs.forEach((p,i)=>{ const off=i-cur,a=Math.abs(off);
      p.style.setProperty('--gap',g+'px'); p.style.setProperty('--off',off);
      p.style.setProperty('--sc',off===0?1:0.84); p.style.setProperty('--op',a>1?0:(off===0?1:0.38));
      p.style.setProperty('--z',10-a); p.style.setProperty('--pe',a<=1?'auto':'none'); p.classList.toggle('center',off===0); });
    dots.forEach((d,i)=>d.classList.toggle('on',i===cur));
    const r=ROLES[cur]; $('ambient').style.setProperty('--glow',r.glow);
    $('go').style.setProperty('--c',r.c); $('go').querySelector('.gt').textContent = r.key==='free'?'체험 시작':(r.key==='create'?'수업 만들기':'수업 참여');
  }
  function move(d){ cur=(cur+d+ROLES.length)%ROLES.length; render(); }
  function to(i){ cur=i; render(); }
  packs.forEach((p,i)=>p.addEventListener('click',()=>{ i===cur?act():to(i); }));
  dots.forEach((d,i)=>d.addEventListener('click',()=>to(i)));
  $('prev').onclick=()=>move(-1); $('next').onclick=()=>move(1); $('go').onclick=act;
  document.addEventListener('keydown',e=>{
    if($('createOv').classList.contains('on')||$('joinOv').classList.contains('on')){ if(e.key==='Escape'){ closeAll(); } return; }
    if(e.key==='ArrowRight') move(1); else if(e.key==='ArrowLeft') move(-1);
    else if(e.key==='Enter') act(); else if(e.key==='Escape') location.href='/platform/index.html';
  });
  function act(){ const r=ROLES[cur];
    if(r.key==='free'){ Session.setMode({mode:'free'}); Session.arm(); location.href='/studio.html'; }
    else if(r.key==='create') openCreate();
    else openJoin();
  }
  function closeAll(){ $('createOv').classList.remove('on'); $('joinOv').classList.remove('on'); }
  $('createOv').addEventListener('click',e=>{ if(e.target===$('createOv')) closeAll(); });
  $('joinOv').addEventListener('click',e=>{ if(e.target===$('joinOv')) closeAll(); });

  /* 수업 만들기 */
  function openCreate(){
    $('createCard').innerHTML=`
      <button class="x" onclick="document.getElementById('createOv').classList.remove('on')">✕</button>
      <h2>수업 개설 <span style="font-size:11px;font-weight:700;color:#ff8472;background:rgba(240,71,58,.16);border-radius:6px;padding:3px 8px;vertical-align:middle;margin-left:4px">교사용</span></h2>
      <p class="sub">교사가 수업을 개설하면 학생 입장 코드가 발급돼요.</p>
      <label class="lbl">수업명</label><input class="in" id="cName" placeholder="예: 3학년 2반 AI 비전 수업" />
      <label class="lbl">예상 인원 (선택)</label><input class="in" id="cCap" type="number" min="1" placeholder="예: 28" />
      <button class="btn" id="cMake">코드 발급하고 개설</button>`;
    $('createOv').classList.add('on'); setTimeout(()=>$('cName').focus(),50);
    $('cMake').onclick=()=>{
      const name=($('cName').value||'').trim(); if(!name){ $('cName').focus(); $('cName').style.borderColor='#ff6a52'; return; }
      const rec=Session.createClass({name, capacity:$('cCap').value});
      Session.setMode({mode:'teach', code:rec.code, name:rec.name});
      $('createCard').innerHTML=`
        <button class="x" onclick="document.getElementById('createOv').classList.remove('on')">✕</button>
        <h2>✅ 수업 개설 완료</h2><p class="sub">학생들에게 아래 <b>입장 코드</b>를 알려주세요.</p>
        <div class="codebig">${rec.code}</div>
        <div class="row" style="margin-bottom:9px">
          <button class="btn ghost" id="cBoard">수업 게시판</button>
          <button class="btn" id="cEnter">콘솔 입장</button>
        </div>
        <p class="sub" style="text-align:center;margin:0">수업명: <b>${esc(rec.name)}</b>${rec.capacity?` · 정원 ${rec.capacity}명`:''}</p>`;
      $('cEnter').onclick=()=>{ Session.arm(); location.href='/studio.html'; };
      $('cBoard').onclick=()=>{ closeAll(); if(window.Board) Board.open({code:rec.code}); };
    };
  }

  /* 수업 참여 */
  let joinSel=null;
  function openJoin(){
    const list=Session.listClasses();
    $('joinCard').innerHTML=`
      <button class="x" onclick="document.getElementById('joinOv').classList.remove('on')">✕</button>
      <h2>수업 참여 <span style="font-size:11px;font-weight:700;color:#42e29b;background:rgba(66,226,155,.16);border-radius:6px;padding:3px 8px;vertical-align:middle;margin-left:4px">학생용</span></h2>
      <p class="sub">참여할 수업을 고르고, 선생님께 받은 코드를 입력하세요.</p>
      <label class="lbl">참여할 수업 선택</label>
      <div class="clist" id="clist">${ list.length? list.map(c=>`<button class="citem" data-code="${c.code}"><div class="cn">${esc(c.name)}</div><div class="cm">${c.capacity?('정원 '+c.capacity+'명'):'정원 미정'}</div></button>`).join('') : '<div class="cl-empty">개설된 수업이 없어요. 코드를 직접 입력해 입장할 수 있어요.</div>' }</div>
      <label class="lbl">입장 코드</label><input class="in" id="jCode" placeholder="선생님께 받은 6자리 코드" maxlength="6" style="text-transform:uppercase;font-family:var(--mono);letter-spacing:.12em" />
      <label class="lbl">이름 / 번호</label><input class="in" id="jName" placeholder="예: 3학년 2반 김에듀" />
      <button class="btn" id="jEnter">입장하기</button>`;
    $('joinOv').classList.add('on');
    joinSel=null;
    $('joinCard').querySelectorAll('.citem').forEach(it=>it.addEventListener('click',()=>{
      $('joinCard').querySelectorAll('.citem').forEach(x=>x.classList.remove('sel')); it.classList.add('sel');
      joinSel=it.dataset.code; setTimeout(()=>$('jCode').focus(),30);
    }));
    $('jEnter').onclick=()=>{
      const code=($('jCode').value||'').trim().toUpperCase(); const name=($('jName').value||'').trim();
      const cls=Session.getClass(code);
      if(!cls){ $('jCode').style.borderColor='#ff6a52'; alert('일치하는 수업 코드가 없어요. 코드를 확인해 주세요.'); return; }
      if(!name){ $('jName').focus(); $('jName').style.borderColor='#ff6a52'; return; }
      Session.setMode({mode:'class', code:cls.code, name:cls.name, student:name});
      Session.arm(); location.href='/studio.html';
    };
  }

  render();
  window.addEventListener('resize',render);
  window.addEventListener('pageshow',()=>{ document.body.style.opacity='1'; });
</script>
</body>
</html>
