<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="/favicon.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<meta name="theme-color" content="#f6f7fb" />
<title>코스 상세 — Eduino AI</title>
<meta name="description" content="Eduino AI 코스 상세 — 동작 미리보기·학습 목표·학습 흐름·준비물을 한눈에." />
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg:#f6f7fb; --bg-soft:#eef1f7; --card:#fff; --card-2:#f9fafd;
    --line:#e9ebf2; --line-2:#dfe2ec;
    --ink:#14161f; --ink-2:#50566a; --ink-3:#868da3; --ink-4:#aeb4c6;
    --primary:#f0473a; --primary-ink:#d12e1e; --primary-2:#ff6a52; --primary-soft:#fff1ee; --primary-line:#ffd6cd;
    --coral:#ff8a3d; --green:#11a06f; --green-soft:#e6f6ef; --blue:#4d8dff; --blue-soft:#eaf1ff;
    --shadow-sm:0 1px 2px rgba(20,22,31,.05), 0 1px 3px rgba(20,22,31,.05);
    --shadow:0 2px 6px rgba(20,22,31,.05), 0 12px 30px rgba(20,22,31,.07);
    --shadow-lg:0 8px 18px rgba(20,22,31,.08), 0 30px 60px rgba(240,71,58,.12);
    --coral-soft:#fff4e8; --coral-ink:#e0751f;
    --r:16px; --r-lg:22px; --sans:'Pretendard',-apple-system,sans-serif; --mono:'JetBrains Mono','Pretendard',ui-monospace,monospace;
  }
  * { box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { margin:0; font-family:var(--sans); color:var(--ink); font-size:16px; line-height:1.62; -webkit-font-smoothing:antialiased;
    word-break:keep-all; overflow-wrap:break-word; letter-spacing:-.011em;
    background:
      radial-gradient(1000px 520px at 88% -8%, rgba(240,71,58,.09), transparent 62%),
      radial-gradient(720px 440px at 0% 3%, rgba(255,106,82,.06), transparent 60%),
      var(--bg); min-height:100vh; }
  a { color:inherit; text-decoration:none; } button { font-family:inherit; cursor:pointer; }
  .wrap { max-width:1080px; margin:0 auto; padding:0 24px; }

  .topbar { position:sticky; top:0; z-index:30; background:rgba(246,247,251,.82); backdrop-filter:blur(14px) saturate(1.4); border-bottom:1px solid var(--line); }
  .topbar::after { content:''; display:block; height:3px; background:linear-gradient(90deg,var(--primary),#ff8a3d 40%,rgba(255,138,61,0) 80%); }
  .topbar-inner { max-width:1080px; margin:0 auto; padding:12px 24px; display:flex; align-items:center; gap:13px; }
  .back { font-size:13px; font-weight:600; color:var(--ink-2); display:inline-flex; align-items:center; gap:6px; padding:8px 12px; border:1px solid var(--line-2); border-radius:10px; background:#fff; box-shadow:var(--shadow-sm); transition:.15s; }
  .back:hover { color:var(--primary-ink); border-color:var(--primary-line); }
  .brand { display:flex; align-items:center; gap:10px; }
  .logo-mark { width:34px; height:34px; border-radius:10px; background:linear-gradient(150deg,var(--primary-2),var(--primary)); color:#fff; display:grid; place-items:center; font-weight:800; font-size:18px; box-shadow:0 4px 12px rgba(240,71,58,.4), inset 0 1px 0 rgba(255,255,255,.4); }
  .logo-title { font-size:16px; font-weight:800; } .logo-title span { color:var(--primary); }
  .logo-img { height:30px; width:auto; display:block; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:7px; font-weight:700; font-size:14.5px; padding:11px 20px; border-radius:11px; border:1px solid transparent; transition:.16s; }
  .btn-primary { color:#fff; background:linear-gradient(150deg,var(--primary-2),var(--primary)); box-shadow:0 6px 18px rgba(240,71,58,.32); }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 10px 24px rgba(240,71,58,.42); }
  .btn-ghost { color:var(--ink); background:#fff; border-color:var(--line-2); box-shadow:var(--shadow-sm); }
  .btn-ghost:hover { border-color:var(--primary-line); color:var(--primary-ink); }
  .btn-lg { padding:14px 26px; font-size:16px; border-radius:13px; }
  .btn-primary:active, .btn-ghost:active { transform:translateY(0); }
  .nav-cta { margin-left:auto; }

  main { max-width:1080px; margin:0 auto; padding:0 24px 60px; }

  /* 히어로 (다크 밴드) */
  .chero { position:relative; margin-top:18px; border-radius:28px; overflow:hidden; padding:34px 36px;
    background:linear-gradient(150deg,#14161f 0%, #1e1411 60%, #241019 100%);
    border:1px solid rgba(255,255,255,.08); box-shadow:0 30px 70px rgba(20,22,31,.30), inset 0 1px 0 rgba(255,255,255,.06); }
  .chero::before { content:''; position:absolute; inset:0; pointer-events:none; opacity:.55;
    background:radial-gradient(58% 80% at 88% -12%, rgba(240,71,58,.5), transparent 60%), radial-gradient(50% 70% at 8% 112%, rgba(124,108,255,.28), transparent 60%); }
  .chero::after { content:''; position:absolute; inset:0; pointer-events:none;
    background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);
    background-size:30px 30px; -webkit-mask-image:radial-gradient(120% 95% at 50% 0%,#000 28%,transparent 78%); mask-image:radial-gradient(120% 95% at 50% 0%,#000 28%,transparent 78%); }
  .chero > * { position:relative; z-index:1; }
  .crumb { font-size:12.5px; color:rgba(255,255,255,.55); margin-bottom:16px; }
  .crumb a:hover { color:#fff; }
  .chead { display:flex; gap:18px; align-items:flex-start; }
  .cic { width:66px; height:66px; border-radius:18px; flex:none; display:grid; place-items:center;
    background:linear-gradient(150deg,var(--primary-2),var(--primary)); border:1px solid rgba(255,255,255,.18); color:#fff; box-shadow:0 8px 20px rgba(240,71,58,.45); }
  .cic svg { width:34px; height:34px; }
  .chead h1 { margin:2px 0 8px; font-size:32px; font-weight:800; letter-spacing:-.03em; color:#fff; }
  .chead .tagline { font-size:16px; color:rgba(255,255,255,.74); margin:0; max-width:640px; }
  .chips { display:flex; gap:7px; flex-wrap:wrap; margin-top:14px; }
  .chip { font-size:12px; font-weight:700; border-radius:999px; padding:5px 12px; border:1px solid rgba(255,255,255,.16); background:rgba(255,255,255,.08); color:#fff; }
  .chip.aud { color:#bcd2ff; background:rgba(77,141,255,.16); border-color:rgba(77,141,255,.34); }
  .chip.lv { color:#ffd9d1; background:rgba(240,71,58,.16); border-color:rgba(240,71,58,.36); }
  .chero-cta { display:flex; gap:11px; flex-wrap:wrap; margin-top:22px; }
  .chero-cta .btn-ghost { background:rgba(255,255,255,.07); border-color:rgba(255,255,255,.2); color:#fff; box-shadow:none; }
  .chero-cta .btn-ghost:hover { background:rgba(255,255,255,.13); border-color:rgba(255,255,255,.34); color:#fff; }

  section.blk { padding-top:48px; }
  .sh { display:flex; align-items:baseline; gap:11px; margin:0 0 18px; flex-wrap:wrap; }
  .sh h2 { margin:0; font-size:22px; font-weight:800; letter-spacing:-.02em; }
  .sh h2::before { content:''; display:inline-block; width:5px; height:19px; border-radius:3px; background:linear-gradient(180deg,var(--primary-2),var(--primary)); margin-right:11px; vertical-align:-2px; }
  .sh .sub { font-size:13px; color:var(--ink-3); font-weight:600; }

  /* ── 동작 미리보기 (시뮬레이션) ── */
  .demo { display:grid; grid-template-columns:1.45fr 1fr; grid-template-rows:auto 1fr; column-gap:18px; row-gap:10px; align-items:stretch; }
  .demo-feats { grid-column:1; grid-row:1; display:flex; gap:7px; flex-wrap:wrap; }
  .dfeat { font-size:12.5px; font-weight:700; padding:7px 13px; border-radius:999px; border:1px solid var(--line-2); background:#fff; color:var(--ink-2); box-shadow:var(--shadow-sm); transition:.15s; }
  .dfeat:hover:not(.on) { border-color:var(--primary-line); color:var(--primary-ink); }
  .dfeat.on { background:var(--ink); color:#fff; border-color:var(--ink); }
  .demo-stage { grid-column:1; grid-row:2; position:relative; min-height:264px; border-radius:var(--r-lg); overflow:hidden; border:1px solid #20242f;
    background:#0f1320; box-shadow:var(--shadow); }
  .demo-stage canvas { display:block; width:100%; height:100%; }
  .demo-stage .live { position:absolute; top:12px; right:12px; display:inline-flex; align-items:center; gap:6px;
    font-family:var(--mono); font-size:10.5px; letter-spacing:.06em; color:#fff; background:rgba(0,0,0,.4);
    border:1px solid rgba(255,255,255,.16); border-radius:999px; padding:4px 10px; backdrop-filter:blur(4px); }
  .demo-stage .live::before { content:''; width:6px; height:6px; border-radius:50%; background:#ff4d4d; animation:blink 1.1s infinite; }
  @keyframes blink { 50% { opacity:.3; } }
  .demo-side { grid-column:2; grid-row:2; display:flex; flex-direction:column; gap:12px; }
  .pipe { display:flex; flex-direction:column; gap:0; background:#fff; border:1px solid var(--line); border-radius:var(--r-lg); padding:16px 18px; box-shadow:var(--shadow-sm); }
  .pnode { display:flex; align-items:center; gap:12px; padding:9px 2px; }
  .pnode .pic { width:36px; height:36px; flex:none; border-radius:11px; display:grid; place-items:center; font-size:18px; }
  .pnode.in .pic { background:var(--blue-soft); }
  .pnode.proc .pic { background:var(--primary-soft); }
  .pnode.out .pic { background:var(--green-soft); }
  .pnode b { display:block; font-size:11px; letter-spacing:.04em; color:var(--ink-3); font-weight:700; }
  .pnode span.pt { font-size:14.5px; font-weight:700; color:var(--ink); }
  .pconn { width:2px; height:16px; margin-left:19px; background:var(--line-2); position:relative; overflow:hidden; }
  .pconn::after { content:''; position:absolute; left:-2px; width:6px; height:6px; border-radius:50%; background:var(--primary); top:0; animation:pdrop 1.6s linear infinite; }
  @keyframes pdrop { 0%{top:-6px;opacity:0} 25%{opacity:1} 75%{opacity:1} 100%{top:16px;opacity:0} }
  .demo-cap { flex:1; display:flex; align-items:center; background:linear-gradient(180deg,var(--primary-soft),#fff); border:1px solid var(--primary-line); border-radius:var(--r-lg); padding:16px 18px; font-size:13.5px; color:var(--ink-2); line-height:1.65; }
  .demo-cap p { margin:0; }
  .demo-cap b { color:var(--primary-ink); }

  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .learn-card { display:flex; gap:14px; align-items:flex-start; background:#fff; border:1px solid var(--line); border-radius:var(--r-lg); padding:20px; box-shadow:var(--shadow-sm); transition:.18s; }
  .learn-card:hover { border-color:var(--primary-line); box-shadow:var(--shadow-lg); transform:translateY(-3px); }
  .lc-ic { width:44px; height:44px; flex:none; border-radius:13px; display:grid; place-items:center; color:#fff; }
  .lc-ic svg { width:22px; height:22px; }
  .lc-ic.i0 { background:linear-gradient(150deg,#1ece90,var(--green)); box-shadow:0 6px 14px rgba(17,160,111,.3); }
  .lc-ic.i1 { background:linear-gradient(150deg,var(--primary-2),var(--primary)); box-shadow:0 6px 14px rgba(240,71,58,.3); }
  .lc-ic.i2 { background:linear-gradient(150deg,#ffb15c,var(--coral)); box-shadow:0 6px 14px rgba(255,138,61,.3); }
  .lc-ic.i3 { background:linear-gradient(150deg,#7aa6ff,var(--blue)); box-shadow:0 6px 14px rgba(77,141,255,.3); }
  .lc-body { min-width:0; }
  .lc-body h3 { margin:0 0 4px; font-size:15.5px; font-weight:800; letter-spacing:-.01em; }
  .lc-body p { margin:0; font-size:13.5px; color:var(--ink-3); line-height:1.55; }

  /* ── 학습 흐름 (플로우차트) ── */
  .flow { display:flex; align-items:stretch; gap:0; }
  .flow-node { flex:1 1 0; min-width:0; background:#fff; border:1px solid var(--line); border-top:3px solid var(--line-2);
    border-radius:var(--r-lg); padding:20px 20px 22px; box-shadow:var(--shadow-sm); position:relative; transition:.3s; }
  .flow-node.t1 { border-top-color:var(--green); } .flow-node.t2 { border-top-color:var(--primary); } .flow-node.t3 { border-top-color:var(--coral); }
  .flow-node .fn-step { position:absolute; top:-13px; left:18px; width:26px; height:26px; border-radius:50%; display:grid; place-items:center;
    font-family:var(--mono); font-size:12px; font-weight:700; color:#fff; box-shadow:var(--shadow-sm); }
  .flow-node.t1 .fn-step { background:var(--green); } .flow-node.t2 .fn-step { background:var(--primary); } .flow-node.t3 .fn-step { background:var(--coral); }
  .flow-node .fn-badge { display:inline-block; font-size:11.5px; font-weight:800; padding:4px 10px; border-radius:999px; margin:6px 0 10px; }
  .flow-node.t1 .fn-badge { color:var(--green); background:var(--green-soft); }
  .flow-node.t2 .fn-badge { color:var(--primary-ink); background:var(--primary-soft); }
  .flow-node.t3 .fn-badge { color:var(--coral); background:#fff4e8; }
  .flow-node h3 { margin:0 0 7px; font-size:16px; font-weight:800; }
  .flow-node p { margin:0; font-size:13px; color:var(--ink-3); line-height:1.6; }
  .flow-node:nth-child(1) { animation:nodeglow 4.5s infinite; }
  .flow-node:nth-child(3) { animation:nodeglow 4.5s infinite 1.5s; }
  .flow-node:nth-child(5) { animation:nodeglow 4.5s infinite 3s; }
  @keyframes nodeglow { 0%,100%,33%{ box-shadow:var(--shadow-sm); } 8%,25%{ box-shadow:0 0 0 2px var(--primary-line), var(--shadow); } }
  .flow-arrow { flex:0 0 46px; align-self:center; position:relative; height:3px; background:var(--line-2); border-radius:2px; }
  .flow-arrow::before { content:''; position:absolute; right:-1px; top:50%; transform:translateY(-50%); border-left:7px solid var(--line-2); border-top:5px solid transparent; border-bottom:5px solid transparent; }
  .flow-arrow::after { content:''; position:absolute; top:50%; transform:translateY(-50%); width:8px; height:8px; border-radius:50%; background:var(--primary); animation:flowdot 1.8s linear infinite; }
  @keyframes flowdot { 0%{left:0;opacity:0} 18%{opacity:1} 82%{opacity:1} 100%{left:100%;opacity:0} }

  .panel { background:#fff; border:1px solid var(--line); border-radius:var(--r-lg); padding:22px; box-shadow:var(--shadow-sm); }
  .needs { display:flex; flex-direction:column; gap:11px; }
  .needs .n { display:flex; gap:10px; align-items:flex-start; font-size:14px; color:var(--ink-2); }
  .needs .n b { color:var(--ink); }
  .needs .ic { width:30px; height:30px; flex:none; border-radius:9px; background:var(--bg-soft); border:1px solid var(--line); display:grid; place-items:center; }
  .twocol { display:grid; grid-template-columns:1.3fr .7fr; gap:18px; align-items:stretch; }
  .twocol > div { display:flex; flex-direction:column; }
  .twocol .panel, .twocol .tip { flex:1; }
  .tip { background:linear-gradient(180deg,var(--primary-soft),#fff); border:1px solid var(--primary-line); border-radius:var(--r-lg); padding:22px; font-size:13.5px; color:var(--ink-2); line-height:1.7; }
  .tip b { color:var(--primary-ink); }
  .techs { display:flex; gap:7px; flex-wrap:wrap; margin-top:10px; }
  .tech { font-family:var(--mono); font-size:11px; color:var(--ink-3); background:var(--card-2); border:1px solid var(--line); border-radius:7px; padding:4px 9px; }

  .cta-banner { margin-top:48px; border-radius:28px; padding:44px 28px; text-align:center; color:#fff;
    background:radial-gradient(600px 240px at 80% 0%, rgba(255,106,82,.5), transparent 60%), linear-gradient(150deg,var(--primary-2),var(--primary)); box-shadow:var(--shadow-lg); }
  .cta-banner h2 { margin:0 0 10px; font-size:25px; font-weight:800; }
  .cta-banner p { margin:0 0 20px; opacity:.92; font-size:15px; }
  .cta-banner .btn-primary { background:#fff; color:var(--primary-ink); }

  .other { display:flex; gap:10px; flex-wrap:wrap; }
  .other a { font-size:13px; font-weight:700; color:var(--ink-2); border:1px solid var(--line-2); background:#fff; border-radius:999px; padding:9px 16px; box-shadow:var(--shadow-sm); transition:.15s; }
  .other a:hover { color:var(--primary-ink); border-color:var(--primary-line); transform:translateY(-1px); box-shadow:var(--shadow); }

  footer { border-top:1px solid var(--line); margin-top:48px; padding:26px 24px; text-align:center; color:var(--ink-4); font-size:12px; }

  @media (max-width:860px){
    .demo{ grid-template-columns:1fr; grid-template-rows:auto auto auto; }
    .demo-feats{ grid-column:1; grid-row:1; }
    .demo-stage{ grid-column:1; grid-row:2; }
    .demo-side{ grid-column:1; grid-row:3; }
  }
  @media (max-width:820px){
    .grid2,.twocol{ grid-template-columns:1fr; }
    .chead h1{ font-size:26px; }
    .flow{ flex-direction:column; }
    .flow-node{ min-width:0; }
    .flow-arrow{ width:3px; height:34px; align-self:center; margin:2px 0; }
    .flow-arrow::before{ right:auto; top:auto; bottom:-1px; left:50%; transform:translateX(-50%); border-left:5px solid transparent; border-right:5px solid transparent; border-top:7px solid var(--line-2); border-bottom:none; }
    .flow-arrow::after{ left:50%; top:0; transform:translateX(-50%); animation:flowdotv 1.8s linear infinite; }
  }
  @keyframes flowdotv { 0%{top:0;opacity:0} 18%{opacity:1} 82%{opacity:1} 100%{top:100%;opacity:0} }
  @media (prefers-reduced-motion: reduce){ .flow-node,.flow-arrow::after,.pconn::after,.demo-stage .live::before{ animation:none !important; } }
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="back" href="/platform/index.html#modules">← 코스 목록</a>
    <a class="brand" href="/platform/index.html"><img class="logo-img" src="/platform/img/logo.webp" alt="Eduino AI" /></a>
    <a class="btn btn-primary nav-cta" id="nav-cta" href="#">체험 시작 →</a>
  </div>
</header>

<main>
  <section class="chero">
    <div class="crumb"><a href="/platform/index.html">Eduino AI</a> › <a href="/platform/index.html#modules">코스</a> › <span id="cr-name">코스</span></div>
    <div class="chead">
      <div class="cic" id="c-ic"></div>
      <div>
        <h1 id="c-name">코스</h1>
        <p class="tagline" id="c-tag"></p>
        <div class="chips" id="c-chips"></div>
        <div class="chero-cta">
          <a class="btn btn-primary btn-lg" id="c-start" href="#">체험 시작 →</a>
          <a class="btn btn-ghost btn-lg" href="/platform/sample.html">맛보기 샘플 체험</a>
        </div>
      </div>
    </div>
  </section>

  <section class="blk"><div class="sh"><h2>동작 미리보기</h2><span class="sub">학습 · 추론이 실제로 이렇게 동작해요</span></div>
    <div class="demo">
      <div class="demo-feats" id="demo-feats"></div>

          <div class="pnode proc"><span class="pic">🧠</span><span><b>학습 · 추론</b><span class="pt" id="demo-proc">처리</span></span></div>
          <div class="pconn"></div>
          <div class="pnode out"><span class="pic">✅</span><span><b>출력</b><span class="pt" id="demo-out">출력</span></span></div>
        </div>
        <div class="demo-cap" id="demo-cap"></div>
      </div>
    </div>
  </section>

  <section class="blk"><div class="sh"><h2>이 코스에서 배우는 것</h2></div>
    <div class="grid2" id="c-learn"></div>
  </section>

  <section class="blk"><div class="sh"><h2>학습 흐름</h2><span class="sub">체험 → 제작 → 응용</span></div>
    <div class="flow" id="c-curr"></div>
  </section>

  <section class="blk"><div class="twocol">
    <div>
      <div class="sh"><h2>준비물 &amp; 환경</h2></div>
      <div class="panel"><div class="needs" id="c-needs"></div>
        <div class="techs" id="c-tech"></div>
      </div>
    </div>
    <div>
      <div class="sh"><h2>교사 팁</h2></div>
      <div class="tip" id="c-tip"></div>
    </div>
  </div></section>

  <section class="blk"><div class="sh"><h2>다른 코스</h2></div>
    <div class="other" id="c-other"></div>
  </section>
</main>

function chip(ctx,x,y,txt,col){ ctx.font='600 12px Pretendard,sans-serif'; ctx.textBaseline='middle'; ctx.textAlign='left';
  const tw=ctx.measureText(txt).width, pad=9, bh=22;
  ctx.fillStyle=col; rr(ctx,x,y,tw+pad*2,bh,6); ctx.fill();
  ctx.fillStyle='#fff'; ctx.fillText(txt,x+pad,y+bh/2+.5); }
function bar(ctx,x,y,w,frac,col){ ctx.fillStyle='rgba(255,255,255,.14)'; rr(ctx,x,y,w,8,4); ctx.fill();
  ctx.fillStyle=col; rr(ctx,x,y,clamp(frac,0,1)*w,8,4); ctx.fill(); }
function screen(ctx,w,h){ ctx.clearRect(0,0,w,h); ctx.fillStyle=PAL.bg; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle=PAL.grid; ctx.lineWidth=1;
  for(let x=24;x<w;x+=26){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
  for(let y=24;y<h;y+=26){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); } }
function coverImg(ctx,im,w,h){ const ir=im.width/im.height, sr=w/h; let dw,dh;
  if(ir>sr){ dh=h; dw=h*ir; } else { dw=w; dh=w/ir; }
  ctx.drawImage(im,(w-dw)/2,(h-dh)/2,dw,dh); }
function scrim(ctx,w,h){ ctx.fillStyle='rgba(15,19,32,.30)'; ctx.fillRect(0,0,w,h); }

/* 실사 배경 (선택적) — 있으면 도식 대신 사진 위에 오버레이, 없으면 도식 폴백.
   확장자(png/jpg/webp) 자동 감지. */
const DEMO_IMG = { v_detect:'vision-detect', v_face:'vision-face', v_pose:'vision-pose', v_classify:'vision-classify', l_qr:'life-qr', l_ocr:'life-ocr', g_track:'gesture-hand', g_rps:'gesture-hand' };
const IMGS = {};
if(typeof Image !== 'undefined'){
  Object.keys(DEMO_IMG).forEach(id=>{ const name=DEMO_IMG[id], exts=['webp','jpg']; let i=0;
    const rec={img:new Image(), ok:false}; IMGS[id]=rec;
    rec.img.onload=()=>{ if(rec.img.width>0) rec.ok=true; };
    rec.img.onerror=()=>{ i++; if(i<exts.length) rec.img.src='/platform/img/demo/'+name+'.'+exts[i]; };
    rec.img.src='/platform/img/demo/'+name+'.'+exts[0]; });
}

const DATA_PTS = Array.from({length:14}, (_,i)=>{ const x=i/13; return [x, clamp(0.14+x*0.72+Math.sin(i*9.73)*0.11, 0.05, 0.95)]; });
const CPTS = Array.from({length:30}, (_,i)=>{ const a=(Math.sin(i*12.9)*0.5+0.5), b=(Math.cos(i*7.31)*0.5+0.5); return [a*0.9+0.05, b*0.86+0.05, (a+b)>1 ? 1 : 0]; });
const QR = (()=>{ const n=11, g=[]; for(let r=0;r<n;r++){ const row=[]; for(let cc=0;cc<n;cc++){ row.push((Math.sin(r*3.1+cc*1.73)*Math.cos(cc*2.29-r*0.91))>0 ? 1:0); } g.push(row); } return g; })();
const CLC = [[.26,.32],[.7,.36],[.46,.76]];
const CL_PTS = (()=>{ const a=[]; CLC.forEach((c,ci)=>{ for(let i=0;i<8;i++){ a.push([clamp(c[0]+Math.sin(ci*9+i*2.1)*0.1,.04,.96), clamp(c[1]+Math.cos(ci*5+i*1.7)*0.12,.04,.96), ci]); } }); return a; })();

function drawPill(ctx,cx,y,txt){ ctx.font='600 14px Pretendard,sans-serif'; ctx.textBaseline='middle'; ctx.textAlign='left';
  const tw=ctx.measureText(txt).width, pad=12, bh=30, x=cx-(tw+pad*2)/2;
  ctx.fillStyle='rgba(255,255,255,.1)'; ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=1.5; rr(ctx,x,y-bh/2,tw+pad*2,bh,8); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.fillText(txt,x+pad,y); }
function drawHand(ctx,px,py,pr,pose){
  ctx.fillStyle='rgba(240,71,58,.16)'; ctx.strokeStyle=PAL.red; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(px,py,pr,0,7); ctx.fill(); ctx.stroke();
  for(let f=0;f<5;f++){ const ang=-Math.PI/2+(f-2)*0.46, len=pr*(0.5+pose[f]*1.9);
    const jx=px+Math.cos(ang)*pr, jy=py+Math.sin(ang)*pr, tx=px+Math.cos(ang)*(pr+len), ty=py+Math.sin(ang)*(pr+len), mx=(jx+tx)/2, my=(jy+ty)/2;
    ctx.strokeStyle=PAL.red; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(jx,jy); ctx.lineTo(mx,my); ctx.lineTo(tx,ty); ctx.stroke();
    [[jx,jy],[mx,my],[tx,ty]].forEach(p=>{ ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(p[0],p[1],3,0,7); ctx.fill(); }); } }

const RPS = [[.15,.1,.1,.1,.1],[1,1,1,1,1],[.15,1,1,.15,.15]];
// 실사 손 사진 위에 얹는 21-포인트 손 랜드마크 템플릿(엄지 오른쪽·손바닥 정면 기준, gesture-hand 사진에 정합)
const HAND21 = [
  [.50,.96],
  [.67,.80],[.77,.70],[.84,.61],[.90,.54],        // thumb (오른쪽)
  [.59,.58],[.61,.43],[.62,.31],[.63,.21],        // index
  [.49,.55],[.49,.38],[.49,.25],[.49,.13],        // middle
  [.39,.58],[.37,.43],[.36,.31],[.35,.22],        // ring
  [.29,.63],[.25,.51],[.22,.41],[.20,.33],        // pinky (왼쪽)
];
const HAND_CONN = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20]];
// 사진 속 손 영역(정규: x,y,w,h)에 랜드마크를 그림
function drawHandLM(ctx, rx, ry, rw, rh) {
  const P = HAND21.map(p => [rx + p[0]*rw, ry + p[1]*rh]);
  ctx.strokeStyle = PAL.red; ctx.lineWidth = 2.5;
  HAND_CONN.forEach(([a,b]) => { ctx.beginPath(); ctx.moveTo(P[a][0],P[a][1]); ctx.lineTo(P[b][0],P[b][1]); ctx.stroke(); });
  ctx.fillStyle = '#fff';
  P.forEach(p => { ctx.beginPath(); ctx.arc(p[0],p[1],3.2,0,7); ctx.fill(); });
}
const SCENES = {};

/* ── 비전 ── */
SCENES.v_detect = (ctx,w,h,t)=>{
  const im=IMGS.v_detect;
  if(im && im.ok){ coverImg(ctx,im.img,w,h); scrim(ctx,w,h);
    const objs=[{x:.33,y:.36,w:.33,h:.42,c:PAL.blue,l:'노트북 94%'},{x:.13,y:.60,w:.15,h:.26,c:PAL.amber,l:'컵 88%'},{x:.70,y:.69,w:.25,h:.19,c:PAL.green,l:'책 81%'}];
    objs.forEach((o,i)=>{ const ap=clamp((t-300-i*450)/500,0,1); if(ap<=0) return;
      ctx.save(); ctx.globalAlpha=ap; ctx.strokeStyle=o.c; ctx.lineWidth=2.5; rr(ctx,o.x*w,o.y*h,o.w*w,o.h*h,8); ctx.stroke(); chip(ctx,o.x*w,o.y*h-24,o.l,o.c); ctx.restore(); });
    chip(ctx,12,12,'객체 탐지 · COCO-SSD',PAL.dim); return; }
  screen(ctx,w,h);
  const objs=[{x:.14,y:.46,w:.3,h:.38,c:PAL.blue,l:'노트북 94%'},{x:.56,y:.26,w:.18,h:.24,c:PAL.amber,l:'컵 88%'},{x:.62,y:.6,w:.24,h:.28,c:PAL.green,l:'책 81%'}];
  objs.forEach((o,i)=>{ const X=o.x*w,Y=o.y*h,W=o.w*w,H=o.h*h;
    ctx.fillStyle='rgba(255,255,255,.09)'; rr(ctx,X,Y,W,H,8); ctx.fill();
    const ap=clamp((t-300-i*450)/500,0,1); if(ap<=0) return;
    ctx.save(); ctx.globalAlpha=ap; ctx.strokeStyle=o.c; ctx.lineWidth=2.5; rr(ctx,X,Y,W,H,8); ctx.stroke(); chip(ctx,X,Y-24,o.l,o.c); ctx.restore(); });
  chip(ctx,12,12,'객체 탐지 · COCO-SSD',PAL.dim);
};
SCENES.v_face = (ctx,w,h,t)=>{
  const im=IMGS.v_face;
  if(im && im.ok){ coverImg(ctx,im.img,w,h); scrim(ctx,w,h);
    const bx=w*0.415, by=h*0.11, bw=w*0.155, bh=h*0.34;
    ctx.strokeStyle=PAL.green; ctx.lineWidth=2.5; rr(ctx,bx,by,bw,bh,8); ctx.stroke();
    chip(ctx,bx,by-24,'얼굴 1명',PAL.green);
    ctx.fillStyle=PAL.red; [[.26,.32],[.74,.32],[.5,.55],[.32,.78],[.68,.78]].forEach(p=>{ ctx.beginPath(); ctx.arc(bx+p[0]*bw,by+p[1]*bh,2.6,0,7); ctx.fill(); });
    chip(ctx,12,12,'얼굴 검출 · BlazeFace',PAL.dim); return; }
  screen(ctx,w,h);
  const cx=w*0.5+Math.sin(t/1400)*w*0.05, cy=h*0.52, R=h*0.24;
  ctx.fillStyle='rgba(255,255,255,.9)'; ctx.beginPath(); ctx.ellipse(cx,cy,R*0.78,R,0,0,7); ctx.fill();
  ctx.strokeStyle=PAL.green; ctx.lineWidth=2.5; rr(ctx,cx-R*0.98,cy-R*1.18,R*1.96,R*2.36,10); ctx.stroke();
  chip(ctx,cx-R*0.98,cy-R*1.18-24,'얼굴 1명',PAL.green);
  ctx.fillStyle=PAL.red; [[-.34,-.22],[.34,-.22],[0,.06],[-.22,.42],[.22,.42],[0,.48]].forEach(p=>{ ctx.beginPath(); ctx.arc(cx+p[0]*R*1.5,cy+p[1]*R,3,0,7); ctx.fill(); });
  chip(ctx,12,12,'얼굴 검출 · BlazeFace',PAL.dim);
};
SCENES.v_pose = (ctx,w,h,t)=>{
  const im=IMGS.v_pose;
  if(im && im.ok){ coverImg(ctx,im.img,w,h); scrim(ctx,w,h);
    const P={head:[.5,.155],neck:[.5,.25],sl:[.455,.28],sr:[.545,.28],el:[.43,.16],er:[.57,.16],hl:[.43,.075],hr:[.57,.075],hip:[.5,.52],kl:[.47,.70],kr:[.53,.70],fl:[.47,.88],fr2:[.53,.88]};
    const bones=[['head','neck'],['neck','sl'],['neck','sr'],['sl','el'],['el','hl'],['sr','er'],['er','hr'],['neck','hip'],['hip','kl'],['kl','fl'],['hip','kr'],['kr','fr2']];
    ctx.strokeStyle=PAL.blue; ctx.lineWidth=3; bones.forEach(b=>{ ctx.beginPath(); ctx.moveTo(P[b[0]][0]*w,P[b[0]][1]*h); ctx.lineTo(P[b[1]][0]*w,P[b[1]][1]*h); ctx.stroke(); });
    ctx.fillStyle='#fff'; Object.keys(P).forEach(k=>{ ctx.beginPath(); ctx.arc(P[k][0]*w,P[k][1]*h,4,0,7); ctx.fill(); });
    chip(ctx,12,12,'자세 추정 · MoveNet',PAL.dim); return; }
  screen(ctx,w,h);
  const cx=w*0.5, top=h*0.18, u=h*0.12, sw=Math.sin(t/700)*0.5;
  const J={head:[cx,top],neck:[cx,top+u],sl:[cx-u*0.95,top+u*1.1],sr:[cx+u*0.95,top+u*1.1],
    el:[cx-u*1.4,top+u*2+sw*u],er:[cx+u*1.4,top+u*2-sw*u],hip:[cx,top+u*3.1],
    kl:[cx-u*0.55,top+u*4.1],kr:[cx+u*0.55,top+u*4.1],fl:[cx-u*0.65,top+u*5.1],fr2:[cx+u*0.65,top+u*5.1]};
  const bones=[['head','neck'],['neck','sl'],['neck','sr'],['sl','el'],['sr','er'],['neck','hip'],['hip','kl'],['hip','kr'],['kl','fl'],['kr','fr2']];
  ctx.strokeStyle=PAL.blue; ctx.lineWidth=3; bones.forEach(b=>{ ctx.beginPath(); ctx.moveTo(J[b[0]][0],J[b[0]][1]); ctx.lineTo(J[b[1]][0],J[b[1]][1]); ctx.stroke(); });
  ctx.fillStyle='#fff'; Object.values(J).forEach(p=>{ ctx.beginPath(); ctx.arc(p[0],p[1],4,0,7); ctx.fill(); });
  chip(ctx,12,12,'자세 추정 · MoveNet',PAL.dim);
};
SCENES.v_classify = (ctx,w,h,t)=>{
  const im=IMGS.v_classify;
  if(im && im.ok){ coverImg(ctx,im.img,w,h); scrim(ctx,w,h);
    const cats=[['고양이',.92,PAL.green],['강아지',.05,PAL.blue],['토끼',.03,PAL.blue]];
    const e=ease(clamp((t-300)/800,0,1)), pw=w*0.36, px=w-pw-14, py=h*0.18, ph=h*0.5, bw=pw-28;
    ctx.fillStyle='rgba(15,19,32,.62)'; ctx.strokeStyle='rgba(255,255,255,.14)'; ctx.lineWidth=1; rr(ctx,px,py,pw,ph,12); ctx.fill(); ctx.stroke();
    ctx.font='600 12px Pretendard,sans-serif'; ctx.textBaseline='alphabetic';
    cats.forEach((ct,i)=>{ const y=py+34+i*((ph-44)/3); const bx=px+14;
      ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.fillText(ct[0],bx,y-6);
      ctx.textAlign='right'; ctx.fillStyle=PAL.dim; ctx.fillText(Math.round(ct[1]*e*100)+'%',bx+bw,y-6);
      bar(ctx,bx,y,bw,ct[1]*e,ct[2]); });
    ctx.textAlign='left'; chip(ctx,12,12,'이미지 분류 · MobileNet',PAL.dim); return; }
  screen(ctx,w,h);
  const is=Math.min(w*0.3,h*0.5), ix=w*0.08, iy=h*0.5-is/2;
  ctx.fillStyle='rgba(255,255,255,.1)'; ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=2; rr(ctx,ix,iy,is,is,12); ctx.fill(); ctx.stroke();
  const fc=ix+is/2, fcy=iy+is*0.54, fr=is*0.26;
  ctx.fillStyle='rgba(255,255,255,.88)';
  ctx.beginPath(); ctx.moveTo(fc-fr,fcy-fr*0.5); ctx.lineTo(fc-fr*0.6,fcy-fr*1.5); ctx.lineTo(fc-fr*0.1,fcy-fr*0.7); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(fc+fr,fcy-fr*0.5); ctx.lineTo(fc+fr*0.6,fcy-fr*1.5); ctx.lineTo(fc+fr*0.1,fcy-fr*0.7); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.arc(fc,fcy,fr,0,7); ctx.fill();
  const cats=[['고양이',.92,PAL.green],['강아지',.05,PAL.blue],['토끼',.03,PAL.blue]];
  const bx=ix+is+w*0.09, bw=w*0.32, e=ease(clamp((t-300)/800,0,1));
  ctx.font='600 12px Pretendard,sans-serif'; ctx.textBaseline='alphabetic';
  cats.forEach((ct,i)=>{ const y=iy+14+i*h*0.18;
    ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.fillText(ct[0],bx,y-6);
    ctx.textAlign='right'; ctx.fillStyle=PAL.dim; ctx.fillText(Math.round(ct[1]*e*100)+'%',bx+bw,y-6);
    bar(ctx,bx,y,bw,ct[1]*e,ct[2]); });
  ctx.textAlign='left'; chip(ctx,12,12,'이미지 분류 · MobileNet',PAL.dim);
};

/* ── 제스처 ── */
SCENES.g_track = (ctx,w,h,t)=>{
  const im=IMGS.g_track;
  if(im && im.ok){ coverImg(ctx,im.img,w,h); scrim(ctx,w,h);
    drawHandLM(ctx, w*0.15, h*0.03, w*0.69, h*0.93); // 사진 속 손에 정합된 21점 오버레이
    chip(ctx,12,12,'손 관절 21점 추적',PAL.dim); return; }
  screen(ctx,w,h);
  const seg=1500, i=Math.floor(t/seg)%3, nx=(i+1)%3, k=ease(clamp(((t%seg)/seg-0.6)/0.4,0,1));
  const pose=RPS[i].map((v,f)=>v*(1-k)+RPS[nx][f]*k);
  drawHand(ctx,w*0.5,h*0.78,h*0.11,pose);
  chip(ctx,12,12,'손 관절 21점 추적',PAL.dim);
};
SCENES.g_rps = (ctx,w,h,t)=>{
  const im=IMGS.g_rps;
  if(im && im.ok){ coverImg(ctx,im.img,w,h); scrim(ctx,w,h);
    drawHandLM(ctx, w*0.15, h*0.03, w*0.69, h*0.93);
    chip(ctx,12,12,'가위바위보 인식',PAL.dim);
    chip(ctx,w-118,12,'✋ 보  92%',PAL.green); return; }
  screen(ctx,w,h);
  const names=['바위','보','가위'], ic=['✊','✋','✌'], i=Math.floor(t/1500)%3;
  drawHand(ctx,w*0.3,h*0.74,h*0.11,RPS[i]);
  ctx.fillStyle='#fff'; ctx.font='800 30px Pretendard,sans-serif'; ctx.textBaseline='middle'; ctx.textAlign='center';
  ctx.fillText(ic[i]+' '+names[i], w*0.66, h*0.44); ctx.textAlign='left';
  chip(ctx,w*0.66-46,h*0.44+26,'확신도 '+(90+i*2)+'%',PAL.green);
  chip(ctx,12,12,'가위바위보 인식',PAL.dim);
};

/* ── 데이터 ── */
SCENES.d_reg = (ctx,w,h,t)=>{ screen(ctx,w,h);
  const ox=w*0.12, oy=h*0.84, ax=w*0.78, ah=oy-h*0.14;
  ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(ox,oy-ah); ctx.lineTo(ox,oy); ctx.lineTo(ox+ax,oy); ctx.stroke();
  ctx.fillStyle=PAL.blue; DATA_PTS.forEach(p=>{ ctx.beginPath(); ctx.arc(ox+p[0]*ax, oy-p[1]*ah, 4, 0, 7); ctx.fill(); });
  const e=ease(clamp((t-300)/2000,0,1)), m=0.18+(0.74-0.18)*e, b=0.4-0.1*e;
  ctx.strokeStyle=PAL.red; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(ox, oy-clamp(b,0,1)*ah); ctx.lineTo(ox+ax, oy-clamp(b+m,0,1)*ah); ctx.stroke();
  chip(ctx,12,12,'회귀 예측  학습 '+Math.round(e*100)+'%',PAL.red);
};
SCENES.d_cluster = (ctx,w,h,t)=>{ screen(ctx,w,h);
  const cols=[PAL.red,PAL.blue,PAL.green], e=clamp((t-400)/1100,0,1);
  CL_PTS.forEach(p=>{ ctx.fillStyle = e<=0 ? 'rgba(255,255,255,.5)' : cols[p[2]];
    ctx.beginPath(); ctx.arc(w*0.1+p[0]*w*0.8, h*0.12+p[1]*h*0.74, 4, 0, 7); ctx.fill(); });
  if(e>0){ CLC.forEach((cc,i)=>{ const x=w*0.1+cc[0]*w*0.8, y=h*0.12+cc[1]*h*0.74; ctx.strokeStyle=cols[i]; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(x-7,y); ctx.lineTo(x+7,y); ctx.moveTo(x,y-7); ctx.lineTo(x,y+7); ctx.stroke(); }); }
  chip(ctx,12,12,'군집 · K-means (k=3)',PAL.dim);
};

/* ── 텍스트 ── */
SCENES.t_sim = (ctx,w,h,t)=>{ screen(ctx,w,h);
  drawPill(ctx,w*0.5,h*0.18,'“고양이가 귀여워”');
  const n=7, gap=w*0.52/n, bx=w*0.24, base=h*0.72;
  for(let i=0;i<n;i++){ const bh=(0.28+0.6*Math.abs(Math.sin(t/620+i*1.1)))*h*0.34; ctx.fillStyle=PAL.blue; rr(ctx,bx+i*gap,base-bh,gap*0.6,bh,3); ctx.fill(); }
  const sim=0.62+0.33*Math.abs(Math.sin(t/1900));
  ctx.fillStyle=PAL.dim; ctx.font='600 11px Pretendard,sans-serif'; ctx.textBaseline='alphabetic'; ctx.textAlign='right'; ctx.fillText('유사도 '+sim.toFixed(2),w-12,h-26); ctx.textAlign='left';
  bar(ctx,12,h-20,w-24,sim,PAL.green);
  chip(ctx,12,12,'문장 → 벡터',PAL.dim);
};
SCENES.t_classify = (ctx,w,h,t)=>{ screen(ctx,w,h);
  drawPill(ctx,w*0.5,h*0.2,'“정말 마음에 들어요”');
  const e=ease(clamp((t-300)/800,0,1)), cats=[['긍정',.91,PAL.green],['부정',.09,PAL.red]], bw=w*0.6, bx=w*0.2;
  ctx.font='600 13px Pretendard,sans-serif'; ctx.textBaseline='alphabetic';
  cats.forEach((ct,i)=>{ const y=h*0.52+i*h*0.22;
    ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.fillText(ct[0],bx,y-7);
    ctx.textAlign='right'; ctx.fillStyle=PAL.dim; ctx.fillText(Math.round(ct[1]*e*100)+'%',bx+bw,y-7);
    bar(ctx,bx,y,bw,ct[1]*e,ct[2]); });
  ctx.textAlign='left'; chip(ctx,12,12,'문장 분류 · 감정',PAL.dim);
};

/* ── 생활 ── */
SCENES.l_qr = (ctx,w,h,t)=>{
  const im=IMGS.l_qr;
  if(im && im.ok){ coverImg(ctx,im.img,w,h); scrim(ctx,w,h);
    const p=(t%3600)/3600;
    if(p<0.6){ const y=h*(p/0.6); ctx.strokeStyle=PAL.red; ctx.lineWidth=2; ctx.shadowColor=PAL.red; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); ctx.shadowBlur=0; chip(ctx,12,12,'스캔 중…',PAL.dim);
    } else { chip(ctx,12,12,'✓ 해독 완료',PAL.green);
      ctx.font='600 14px Pretendard,sans-serif'; ctx.fillStyle='#fff'; ctx.textBaseline='middle'; ctx.textAlign='center';
      ctx.fillText('https://eduino.kr', w*0.5, h*0.9); ctx.textAlign='left'; }
    return; }
  screen(ctx,w,h);
  const s=Math.min(w,h)*0.5, qx=w*0.5-s/2, qy=h*0.4-s/2, cs=s/11;
  ctx.fillStyle='#fff'; QR.forEach((row,r)=>row.forEach((v,cc)=>{ if(v) ctx.fillRect(qx+cc*cs, qy+r*cs, cs+0.5, cs+0.5); }));
  const fnd=(x,y)=>{ ctx.fillStyle='#fff'; ctx.fillRect(x,y,cs*3,cs*3); ctx.fillStyle=PAL.bg; ctx.fillRect(x+cs*0.5,y+cs*0.5,cs*2,cs*2); ctx.fillStyle='#fff'; ctx.fillRect(x+cs,y+cs,cs,cs); };
  fnd(qx,qy); fnd(qx+s-cs*3,qy); fnd(qx,qy+s-cs*3);
  const p=(t%3600)/3600;
  if(p<0.6){ const y=qy+s*(p/0.6); ctx.strokeStyle=PAL.red; ctx.lineWidth=2; ctx.shadowColor=PAL.red; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.moveTo(qx,y); ctx.lineTo(qx+s,y); ctx.stroke(); ctx.shadowBlur=0; chip(ctx,12,12,'스캔 중…',PAL.dim);
  } else { chip(ctx,12,12,'✓ 해독 완료',PAL.green);
    ctx.font='600 14px Pretendard,sans-serif'; ctx.fillStyle='#fff'; ctx.textBaseline='middle'; ctx.textAlign='center';
    ctx.fillText('https://eduino.kr', w*0.5, h*0.9); ctx.textAlign='left'; }
};
SCENES.l_ocr = (ctx,w,h,t)=>{
  const im=IMGS.l_ocr;
  if(im && im.ok){ coverImg(ctx,im.img,w,h); scrim(ctx,w,h);
    const p=(t%3400)/3400;
    if(p<0.62){ const y=h*(p/0.62); ctx.fillStyle='rgba(240,71,58,.16)'; ctx.fillRect(0,y-12,w,24);
      ctx.strokeStyle=PAL.red; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
      chip(ctx,12,12,'글자 인식 중…',PAL.dim);
    } else { chip(ctx,12,12,'✓ 텍스트 변환 완료',PAL.green);
      ctx.font='700 15px Pretendard,sans-serif'; ctx.textBaseline='middle'; ctx.textAlign='center';
      const txt='“오늘 급식: 카레라이스”', tw=ctx.measureText(txt).width;
      ctx.fillStyle='rgba(15,19,32,.66)'; rr(ctx, w*0.5-tw/2-10, h*0.86-15, tw+20, 30, 8); ctx.fill();
      ctx.fillStyle='#fff'; ctx.fillText(txt, w*0.5, h*0.86); ctx.textAlign='left'; }
    return; }
  screen(ctx,w,h);
  const dx=w*0.22, dy=h*0.16, dw=w*0.56, dh=h*0.58;
  ctx.fillStyle='rgba(255,255,255,.93)'; rr(ctx,dx,dy,dw,dh,10); ctx.fill();
  ctx.fillStyle='rgba(20,22,31,.18)'; for(let i=0;i<5;i++){ rr(ctx,dx+18,dy+22+i*dh*0.16,dw-36-(i===4?dw*0.32:0),8,4); ctx.fill(); }
  const p=(t%3400)/3400;
  if(p<0.62){ const y=dy+dh*(p/0.62); ctx.fillStyle='rgba(240,71,58,.16)'; ctx.fillRect(dx,y-9,dw,18);
    ctx.strokeStyle=PAL.red; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(dx,y); ctx.lineTo(dx+dw,y); ctx.stroke();
    chip(ctx,12,12,'글자 인식 중…',PAL.dim);
  } else { ctx.fillStyle=PAL.green; ctx.font='600 14px Pretendard,sans-serif'; ctx.textBaseline='middle'; ctx.textAlign='center';
    ctx.fillText('“오늘 급식: 카레라이스”', w*0.5, dy+dh+22); ctx.textAlign='left'; chip(ctx,12,12,'✓ 텍스트 변환 완료',PAL.green); }
};

/* ── 개념 ── */
function cpts(ctx,w,h){ CPTS.forEach(p=>{ ctx.fillStyle = p[2] ? 'rgba(240,71,58,.92)' : 'rgba(77,141,255,.92)';
  ctx.beginPath(); ctx.arc(w*0.1+p[0]*w*0.8, h*0.12+p[1]*h*0.74, 4, 0, 7); ctx.fill(); }); }
SCENES.c_boundary = (ctx,w,h,t)=>{ screen(ctx,w,h); cpts(ctx,w,h);
  const curv=Math.sin(t/1500), tilt=Math.sin(t/2100);
  ctx.strokeStyle=PAL.green; ctx.lineWidth=2.5; ctx.beginPath();
  for(let x=0;x<=w;x+=8){ const nx=x/w, y=h*0.5 + (nx-0.5)*h*0.42*tilt + Math.sin(nx*Math.PI*1.6)*h*0.14*curv; x===0?ctx.moveTo(x,y):ctx.lineTo(x,y); } ctx.stroke();
  chip(ctx,12,12,'결정 경계  정확도 '+Math.round(86+9*Math.abs(Math.sin(t/1700)))+'%',PAL.green);
};
SCENES.c_overfit = (ctx,w,h,t)=>{ screen(ctx,w,h); cpts(ctx,w,h);
  ctx.strokeStyle=PAL.amber; ctx.lineWidth=2.5; ctx.beginPath();
  for(let x=0;x<=w;x+=5){ const nx=x/w, y=h*0.5 + (nx-0.5)*h*0.28 + Math.sin(nx*Math.PI*8 + t/600)*h*0.16; x===0?ctx.moveTo(x,y):ctx.lineTo(x,y); } ctx.stroke();
  chip(ctx,12,12,'과적합 · 경계가 점에 달라붙음',PAL.amber);
};

const FEATS = {
  vision:[{id:'v_detect',label:'객체 탐지'},{id:'v_face',label:'얼굴 검출'},{id:'v_pose',label:'자세 추정'},{id:'v_classify',label:'이미지 분류'}],
  gesture:[{id:'g_track',label:'손 관절 추적'},{id:'g_rps',label:'가위바위보'}],
  data:[{id:'d_reg',label:'회귀 예측'},{id:'d_cluster',label:'군집 K-means'}],
  text:[{id:'t_sim',label:'문장 유사도'},{id:'t_classify',label:'문장 분류'}],
  life:[{id:'l_qr',label:'QR·바코드'},{id:'l_ocr',label:'글자 인식'}],
  concept:[{id:'c_boundary',label:'결정 경계'},{id:'c_overfit',label:'과적합 비교'}],
};

(function startDemo(){
  const feats = FEATS[dkey] || FEATS.vision;
  const now0 = () => (window.performance && performance.now) ? performance.now() : Date.now();
  let cur = 0, tBase = now0();
  const chipsEl = document.getElementById('demo-feats');
  function hi(){ if(!chipsEl) return; const k=chipsEl.children; for(let i=0;i<k.length;i++) k[i].classList.toggle('on', i===cur); }
  if(chipsEl){
    chipsEl.innerHTML = feats.map((f,i)=>`<button type="button" class="dfeat${i===0?' on':''}" data-i="${i}">${f.label}</button>`).join('');
    chipsEl.querySelectorAll('.dfeat').forEach(b=>b.addEventListener('click',()=>{ cur=+b.dataset.i; tBase=now0(); hi(); }));
  }
  const cv = document.getElementById('demo-canvas');
  if(!cv || !cv.getContext) return;
  const ctx = cv.getContext('2d');
  if(!ctx) return;                       // jsdom 등 캔버스 미지원 환경 가드 (탭은 위에서 이미 렌더)
  const reduce = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
  function size(){ const r=cv.getBoundingClientRect(); const dpr=Math.min(window.devicePixelRatio||1,2);
    cv.width=Math.max(1,r.width*dpr); cv.height=Math.max(1,r.height*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); }
  size(); window.addEventListener('resize', size);
  function draw(localT){ const r=cv.getBoundingClientRect(); (SCENES[feats[cur].id]||SCENES.v_detect)(ctx, r.width, r.height, localT); }
  function frame(now){ if(now-tBase>3600){ cur=(cur+1)%feats.length; tBase=now; hi(); } draw(now-tBase);
    if(window.requestAnimationFrame) requestAnimationFrame(frame); }
  if(reduce) draw(2000);
  else if(window.requestAnimationFrame) requestAnimationFrame(frame);
  else draw(2000);
})();
</script>
