  * { box-sizing:border-box; }
  html { scroll-behavior:smooth; }

  .wrap { max-width:1080px; margin:0 auto; padding:0 24px; }

  .topbar-inner { max-width:1080px; margin:0 auto; padding:12px 24px; display:flex; align-items:center; gap:13px; }
  .back { font-size:13px; font-weight:600; color:var(--ink-2); display:inline-flex; align-items:center; gap:6px; padding:8px 12px; border:1px solid var(--line-2); border-radius:10px; background:#fff; box-shadow:var(--shadow-sm); transition:.15s; }

  .brand { display:flex; align-items:center; gap:10px; }
  .logo-mark { width:34px; height:34px; border-radius:10px; background:linear-gradient(150deg,var(--primary-2),var(--primary)); color:#fff; display:grid; place-items:center; font-weight:800; font-size:18px; box-shadow:0 4px 12px rgba(240,71,58,.4), inset 0 1px 0 rgba(255,255,255,.4); }
  .logo-title { font-size:16px; font-weight:800; } .logo-title span { color:var(--primary); }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:7px; font-weight:700; font-size:14.5px; padding:11px 20px; border-radius:11px; border:1px solid transparent; transition:.16s; }
  .btn-primary { color:#fff; background:linear-gradient(150deg,var(--primary-2),var(--primary)); box-shadow:0 6px 18px rgba(240,71,58,.32); }

  .btn-ghost { color:var(--ink); background:#fff; border-color:var(--line-2); box-shadow:var(--shadow-sm); }
  .btn-ghost:hover { border-color:var(--primary-line); color:var(--primary-ink); }
  .btn-lg { padding:13px 24px; font-size:15.5px; border-radius:12px; }
  .nav-cta { margin-left:auto; }

  main { max-width:1080px; margin:0 auto; padding:0 24px 60px; }

  .crumb { font-size:12.5px; color:var(--ink-3); margin-bottom:16px; }
  .crumb a:hover { color:var(--primary-ink); }
  .chead { display:flex; gap:18px; align-items:flex-start; }
  .cic { width:66px; height:66px; border-radius:18px; flex:none; display:grid; place-items:center;
    background:linear-gradient(150deg,var(--primary-soft),#fff); border:1px solid var(--primary-line); color:var(--primary); box-shadow:var(--shadow-sm); }

  .chead h1 { margin:2px 0 8px; font-size:32px; font-weight:800; letter-spacing:-.03em; }
  .chead .tagline { font-size:16px; color:var(--ink-2); margin:0; max-width:640px; }
  .chips { display:flex; gap:7px; flex-wrap:wrap; margin-top:14px; }
  .chip { font-size:12px; font-weight:700; border-radius:999px; padding:5px 12px; border:1px solid var(--line-2); background:#fff; color:var(--ink-2); }
  .chip.aud { color:#2c63c4; background:var(--blue-soft); border-color:rgba(77,141,255,.3); }
  .chip.lv { color:var(--primary-ink); background:var(--primary-soft); border-color:var(--primary-line); }
  .chip.lock { color:var(--ink-2); background:var(--bg-soft); border-color:var(--line-2); }
  .chero-cta { display:flex; gap:11px; flex-wrap:wrap; margin-top:22px; }

  section.blk { padding-top:36px; }
  .sh { display:flex; align-items:baseline; gap:11px; margin:0 0 16px; }
  .sh h2 { margin:0; font-size:21px; font-weight:800; letter-spacing:-.02em; }

  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .learn-item { display:flex; gap:11px; align-items:flex-start; background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 16px; box-shadow:var(--shadow-sm); font-size:14px; color:var(--ink-2); }
  .learn-item svg { width:19px; height:19px; flex:none; color:var(--green); margin-top:1px; }

  .curr { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .cu { background:#fff; border:1px solid var(--line); border-radius:var(--r); padding:20px; box-shadow:var(--shadow-sm); position:relative; }
  .cu .badge { display:inline-block; font-size:11.5px; font-weight:800; padding:5px 11px; border-radius:999px; margin-bottom:12px; }
  .cu.t1 .badge { color:var(--green); background:var(--green-soft); }
  .cu.t2 .badge { color:var(--primary-ink); background:var(--primary-soft); }
  .cu.t3 .badge { color:var(--coral); background:#fff4e8; }
  .cu h3 { margin:0 0 7px; font-size:16px; font-weight:800; }
  .cu p { margin:0; font-size:13px; color:var(--ink-3); line-height:1.6; }

  .panel { background:#fff; border:1px solid var(--line); border-radius:var(--r); padding:20px; box-shadow:var(--shadow-sm); }
  .needs { display:flex; flex-direction:column; gap:10px; }
  .needs .n { display:flex; gap:10px; align-items:flex-start; font-size:14px; color:var(--ink-2); }
  .needs .n b { color:var(--ink); }
  .needs .ic { width:30px; height:30px; flex:none; border-radius:9px; background:var(--bg-soft); border:1px solid var(--line); display:grid; place-items:center; }
  .twocol { display:grid; grid-template-columns:1.3fr .7fr; gap:18px; align-items:start; }
  .tip { background:linear-gradient(180deg,var(--primary-soft),#fff); border:1px solid var(--primary-line); border-radius:var(--r); padding:18px; font-size:13.5px; color:var(--ink-2); line-height:1.7; }

  .techs { display:flex; gap:7px; flex-wrap:wrap; margin-top:10px; }
  .tech { font-family:var(--mono); font-size:11px; color:var(--ink-3); background:var(--card-2); border:1px solid var(--line); border-radius:7px; padding:4px 9px; }

  .cta-banner p { margin:0 0 20px; opacity:.92; font-size:15px; }
  .cta-banner .btn-primary { background:#fff; color:var(--primary-ink); }

  .other { display:flex; gap:10px; flex-wrap:wrap; }
  .other a { font-size:13px; font-weight:700; color:var(--ink-2); border:1px solid var(--line-2); background:#fff; border-radius:999px; padding:8px 14px; box-shadow:var(--shadow-sm); }
  .other a:hover { color:var(--primary-ink); border-color:var(--primary-line); }

  footer { border-top:1px solid var(--line); margin-top:48px; padding:26px 24px; text-align:center; color:var(--ink-4); font-size:12px; }

  @media (max-width:820px){ .grid2,.curr,.twocol{ grid-template-columns:1fr; } .chead h1{ font-size:26px; } }
</style>
</head>
