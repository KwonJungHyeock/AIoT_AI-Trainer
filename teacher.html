<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="/favicon.png" />
<meta name="theme-color" content="#0a0b12" />
<title>교사 확인함 · VISION AI</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#0a0b12;--bg-2:#0f1120;--ink:#f2f4fb;--ink-2:#aeb6cf;--ink-3:#737c9c;
    --line:rgba(255,255,255,.10);--line-2:rgba(255,255,255,.16);--panel:rgba(255,255,255,.045);
    --acc:#3b86ff;--acc-2:#6aa6ff;--acc-soft:rgba(59,134,255,.16);--green:#42e29b;--amber:#ffd36a;--rose:#ff7a6a;
    --mono:'JetBrains Mono',ui-monospace,monospace; }
  *{box-sizing:border-box;} html,body{margin:0;}
  body{font-family:'Pretendard',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;
    word-break:keep-all;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(60% 40% at 50% 0%,var(--acc-soft),transparent 60%);}
  a{color:inherit;text-decoration:none;} button{font-family:inherit;cursor:pointer;}
  .hud{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 26px;position:sticky;top:0;z-index:10;
    background:rgba(10,11,18,.8);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:11px;} .brand img{height:26px;}
  .brand .t{font-size:14px;font-weight:800;} .brand .t span{color:#f0473a;}
  .brand .sep{width:1px;height:16px;background:var(--line-2);}
  .brand .sys{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.16em;color:var(--ink-3);}
  .hbtn{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--ink-2);
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 12px;transition:.15s;}
  .hbtn:hover{color:var(--ink);border-color:var(--acc-2);}
  .wrap{max-width:1120px;margin:0 auto;padding:22px;}
  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
  .head h1{margin:0;font-size:26px;font-weight:800;letter-spacing:-.02em;}
  .head p{margin:6px 0 0;font-size:13px;color:var(--ink-3);}
  .stats{display:flex;gap:10px;}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px 16px;text-align:center;}
  .stat .n{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--acc-2);} .stat .l{font-size:11px;color:var(--ink-3);}
  .toolbar{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:20px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
  .empty{grid-column:1/-1;text-align:center;color:var(--ink-3);padding:70px 0;font-size:14px;line-height:1.7;}
  .sub{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;}
  .sub.done{border-color:rgba(66,226,155,.4);}
  .sub-img{width:100%;aspect-ratio:4/3;object-fit:cover;background:#05060c;}
  .sub-no-img{width:100%;aspect-ratio:4/3;display:grid;place-items:center;background:#05060c;color:var(--ink-3);font-size:13px;}
  .sub-b{padding:15px 16px;display:flex;flex-direction:column;gap:9px;flex:1;}
  .sub-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .sub-name{font-size:16px;font-weight:800;}
  .sub-feat{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--acc-2);background:var(--acc-soft);
    border:1px solid rgba(59,134,255,.3);border-radius:7px;padding:3px 8px;}
  .sub-meta{font-family:var(--mono);font-size:11px;color:var(--ink-3);}
  .sub-chips{display:flex;flex-wrap:wrap;gap:5px;}
  .sub-chips span{font-size:11px;color:var(--ink-2);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:999px;padding:3px 8px;}
  .sub-note{font-size:13px;color:var(--ink-2);line-height:1.55;background:rgba(255,255,255,.03);border-radius:10px;padding:9px 11px;}
  .sub-note.empty-note{color:var(--ink-3);font-style:italic;}
  .eval{border-top:1px solid var(--line);padding:13px 16px;display:flex;flex-direction:column;gap:9px;background:rgba(255,255,255,.02);}
  .eval-row{display:flex;gap:8px;}
  .ev{flex:1;font-size:13px;font-weight:700;border:1px solid var(--line-2);border-radius:10px;padding:9px;color:var(--ink-2);background:rgba(255,255,255,.04);transition:.15s;}
  .ev:hover{color:#fff;}
  .ev.pass.on{color:#04140c;background:var(--green);border-color:var(--green);}
  .ev.redo.on{color:#1a0a08;background:var(--amber);border-color:var(--amber);}
  .fb{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--line-2);border-radius:10px;color:var(--ink);font-size:13px;font-family:inherit;padding:9px 11px;}
  .fb:focus{outline:none;border-color:var(--acc-2);}
  .save{font-size:12.5px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--acc-2),var(--acc));border:0;border-radius:10px;padding:9px 14px;}
  .del{font-size:11.5px;color:var(--ink-3);background:none;border:0;align-self:flex-start;text-decoration:underline;}
  .note-banner{background:rgba(255,180,60,.08);border:1px solid rgba(255,180,60,.25);border-radius:12px;padding:12px 15px;font-size:12.5px;color:var(--amber);margin-bottom:18px;line-height:1.6;}
</style>
</head>
<body>
<header class="hud">
  <a class="brand" href="/studio.html">
    <img src="/platform/img/logo-mark.webp" alt="Eduino AI" />
    <span class="t">Eduino <span>AI</span></span><span class="sep"></span><span class="sys">교사용</span>
  </a>
  <a class="hbtn" href="/studio.html">← 콘솔</a>
</header>

<main class="wrap">
  <div class="head">
    <div>
      <h1>교사 확인함</h1>
      <p>학생들이 제출한 미션을 확인하고 평가해요</p>
    </div>
    <div class="stats">
      <div class="stat"><div class="n" id="stTotal">0</div><div class="l">전체</div></div>
      <div class="stat"><div class="n" id="stWait">0</div><div class="l">미평가</div></div>
      <div class="stat"><div class="n" id="stDone">0</div><div class="l">평가완료</div></div>
    </div>
  </div>

  <div class="note-banner">ℹ️ 1차 데모 버전이라 제출물은 <b>이 브라우저(localStorage)</b>에 저장돼요. 다른 기기 제출물은 <b>‘파일 가져오기’</b>로 불러오세요. (실시간 교실 연동은 백엔드 연결 시 지원)</div>

  <div class="toolbar">
    <button class="hbtn" id="importBtn">파일 가져오기</button>
    <input type="file" id="fileInput" accept="application/json" multiple style="display:none" />
    <button class="hbtn" id="exportBtn">전체 내보내기</button>
    <button class="hbtn" id="clearBtn">전체 비우기</button>
    <button class="hbtn" id="reloadBtn">새로고침</button>
  </div>

  <div class="grid" id="grid"></div>
</main>

<script>
  const KEY='vision_submissions';
  const load=()=>{ try{ return JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){ return []; } };
  const saveAll=(l)=>localStorage.setItem(KEY, JSON.stringify(l));
  const esc=(s)=>(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
  const fmt=(iso)=>{ try{ const d=new Date(iso); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }catch(e){ return ''; } };

  function render(){
    const list=load();
    document.getElementById('stTotal').textContent=list.length;
    document.getElementById('stWait').textContent=list.filter(s=>s.status!=='평가완료').length;
    document.getElementById('stDone').textContent=list.filter(s=>s.status==='평가완료').length;
    const grid=document.getElementById('grid');
    if(!list.length){ grid.innerHTML='<div class="empty">아직 제출물이 없어요.<br>학생이 스테이지에서 <b>📤 미션 제출</b>을 하거나,<br>위 <b>파일 가져오기</b>로 제출 파일을 불러오세요.</div>'; return; }
    grid.innerHTML=list.map(s=>`
      <div class="sub${s.status==='평가완료'?' done':''}" data-id="${s.id}">
        ${s.img?`<img class="sub-img" src="${s.img}" alt="제출 스냅샷" />`:'<div class="sub-no-img">스냅샷 없음</div>'}
        <div class="sub-b">
          <div class="sub-top"><span class="sub-name">${esc(s.name)||'이름없음'}</span><span class="sub-feat">${esc(s.label)}</span></div>
          <div class="sub-meta">${fmt(s.time)} · ${s.status==='평가완료'?'평가완료':'미평가'}</div>
          <div class="sub-chips">${(s.summary||[]).map(c=>`<span>${esc(c)}</span>`).join('')}</div>
          <div class="sub-note${s.note?'':' empty-note'}">${s.note?esc(s.note):'소감 없음'}</div>
        </div>
        <div class="eval">
          <div class="eval-row">
            <button class="ev pass${s.result==='pass'?' on':''}" data-r="pass">✓ 통과</button>
            <button class="ev redo${s.result==='redo'?' on':''}" data-r="redo">↻ 재도전</button>
          </div>
          <input class="fb" placeholder="한 줄 피드백…" value="${esc(s.feedback)}" />
          <div style="display:flex;justify-content:space-between;align-items:center">
            <button class="del">삭제</button>
            <button class="save">평가 저장</button>
          </div>
        </div>
      </div>`).join('');
    grid.querySelectorAll('.sub').forEach(cardEl=>{
      const id=cardEl.dataset.id;
      cardEl.querySelectorAll('.ev').forEach(b=>b.addEventListener('click',()=>{
        cardEl.querySelectorAll('.ev').forEach(x=>x.classList.remove('on')); b.classList.add('on'); b.dataset.sel='1';
        cardEl._result=b.dataset.r;
      }));
      cardEl.querySelector('.save').addEventListener('click',()=>{
        const list=load(); const rec=list.find(x=>x.id===id); if(!rec) return;
        const sel=cardEl.querySelector('.ev.on'); rec.result=sel?sel.dataset.r:rec.result||null;
        rec.feedback=cardEl.querySelector('.fb').value.trim();
        rec.status=(rec.result?'평가완료':'제출됨'); saveAll(list); render();
      });
      cardEl.querySelector('.del').addEventListener('click',()=>{
        if(!confirm('이 제출물을 삭제할까요?')) return;
        saveAll(load().filter(x=>x.id!==id)); render();
      });
    });
  }

  document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change', async (e)=>{
    const files=[...e.target.files]; const list=load(); let added=0;
    for(const f of files){ try{ const txt=await f.text(); const obj=JSON.parse(txt);
      const recs=Array.isArray(obj)?obj:[obj];
      recs.forEach(r=>{ if(r&&r.id&&!list.some(x=>x.id===r.id)){ list.unshift(r); added++; } });
    }catch(err){ console.error(err); } }
    saveAll(list); render(); alert(added+'건 가져왔어요.'); e.target.value='';
  });
  document.getElementById('exportBtn').addEventListener('click',()=>{
    const blob=new Blob([JSON.stringify(load(),null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='제출물_전체.json'; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  });
  document.getElementById('clearBtn').addEventListener('click',()=>{ if(confirm('모든 제출물을 비울까요? (되돌릴 수 없어요)')){ saveAll([]); render(); } });
  document.getElementById('reloadBtn').addEventListener('click',render);
  render();
</script>
</body>
</html>
