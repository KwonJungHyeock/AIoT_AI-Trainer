<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<meta name="theme-color" content="#f6f7fb" />
<title>실습용 QR·바코드 인쇄 시트 — Eduino AI</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root { --ink:#14161f; --ink-3:#868da3; --line:#e2e5ee; --primary:#f0473a; --sans:'Pretendard',sans-serif; --mono:ui-monospace,monospace; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:var(--sans); color:var(--ink); background:#f6f7fb; }
  .bar { max-width:900px; margin:0 auto; padding:18px 22px; display:flex; align-items:center; gap:12px; }
  .bar a { font-size:13px; color:var(--ink-3); text-decoration:none; border:1px solid var(--line); background:#fff; padding:8px 12px; border-radius:9px; }
  .bar h1 { font-size:19px; margin:0; }
  .bar h1 span { color:var(--primary); }
  .bar .print { margin-left:auto; background:var(--primary); color:#fff; border:none; padding:10px 18px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; }
  .sheet { max-width:900px; margin:0 auto 40px; background:#fff; border:1px solid var(--line); border-radius:14px; padding:26px; }
  .sheet .lead { color:var(--ink-3); font-size:13.5px; margin:0 0 20px; }
  h2 { font-size:15px; margin:24px 0 12px; padding-bottom:6px; border-bottom:2px solid var(--primary); display:inline-block; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
  .item { border:1px solid var(--line); border-radius:12px; padding:14px; text-align:center; break-inside:avoid; }
  .item canvas, .item svg { max-width:100%; height:auto; }
  .item .cap { font-size:12.5px; font-weight:700; margin-top:8px; }
  .item .desc { font-size:11px; color:var(--ink-3); margin-top:3px; font-family:var(--mono); word-break:break-all; }
  .bgrid { display:grid; grid-template-columns:repeat(2,1fr); gap:18px; }
  @media print {
    body { background:#fff; } .bar { display:none; } .sheet { border:none; box-shadow:none; max-width:none; margin:0; padding:0; }
    .item { border:1px solid #ccc; }
  }
</style>
</head>
<body>
<div class="bar">
  <a href="/modules/life/index.html">← 코스로</a>
  <h1>실습용 QR·바코드 시트 <span>Eduino AI</span></h1>
  <button class="print" onclick="window.print()">🖨 인쇄</button>
</div>

<div class="sheet">
  <p class="lead">아래 코드를 인쇄해 잘라서 사용하세요. 카메라에 비추면 생활 속 인식 AI 코스에서 읽힙니다. (QR은 휴대폰 카메라로도 테스트 가능)</p>

  <h2>QR 코드</h2>
  <div class="grid" id="qr-grid"></div>

  <h2>바코드 (1D)</h2>
  <div class="bgrid" id="bc-grid"></div>
</div>

<script>
const QRS = [
  { text: 'https://www.eduino.kr', cap: '링크 열기', desc: 'eduino.kr' },
  { text: 'Eduino AI — 안녕하세요! 🤖', cap: '인사 메시지', desc: '텍스트' },
  { text: '가위바위보를 해볼까요?', cap: '한글 텍스트', desc: '한글' },
  { text: '20240617-EDU-001', cap: '출석 번호 예시', desc: '20240617-EDU-001' },
  { text: 'WIFI:T:WPA;S:Eduino;P:eduino1234;;', cap: '와이파이 정보', desc: 'SSID: Eduino' },
  { text: '3.14159265358979', cap: '원주율 숫자', desc: '3.14159…' },
];
const qg = document.getElementById('qr-grid');
QRS.forEach((q) => {
  const d = document.createElement('div'); d.className = 'item';
  // 1순위: 이미지 API(즉시 렌더) · 실패 시 JS 라이브러리로 대체
  const img = document.createElement('img');
  img.width = 180; img.height = 180; img.alt = q.cap;
  img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=8&data=' + encodeURIComponent(q.text);
  img.onerror = () => { // 폴백: qrcode 라이브러리
    const c = document.createElement('canvas'); img.replaceWith(c);
    if (window.QRCode) QRCode.toCanvas(c, q.text, { width: 180, margin: 1 }, () => {});
  };
  d.appendChild(img);
  d.insertAdjacentHTML('beforeend', `<div class="cap">${q.cap}</div><div class="desc">${q.desc}</div>`);
  qg.appendChild(d);
});

const BCS = [
  { val: '880123456789', fmt: 'EAN13', cap: '제품 바코드 (EAN-13)' },
  { val: 'EDUINO-AI', fmt: 'CODE128', cap: '코드128 (문자)' },
  { val: '12345678', fmt: 'CODE128', cap: '코드128 (숫자)' },
  { val: '4006381333931', fmt: 'EAN13', cap: '제품 바코드 (EAN-13)' },
];
const bg = document.getElementById('bc-grid');
BCS.forEach((b) => {
  const d = document.createElement('div'); d.className = 'item';
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  d.appendChild(svg);
  d.insertAdjacentHTML('beforeend', `<div class="cap">${b.cap}</div>`);
  bg.appendChild(d);
  try { JsBarcode(svg, b.val, { format: b.fmt, width: 2, height: 70, fontSize: 15, margin: 6 }); } catch (e) {}
});
</script>
</body>
</html>
