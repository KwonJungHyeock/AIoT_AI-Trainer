<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="/favicon.png" />
<meta name="theme-color" content="#0a0b12" />
<title>객체 탐지 · VISION AI</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>

<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg:#0a0b12; --bg-2:#0f1120;
    --ink:#f2f4fb; --ink-2:#aeb6cf; --ink-3:#737c9c;
    --line:rgba(255,255,255,.10); --line-2:rgba(255,255,255,.16);
    --panel:rgba(255,255,255,.045);
    --acc:#3b86ff; --acc-2:#6aa6ff; --acc-soft:rgba(59,134,255,.18);
    --green:#00ff88; --amber:#ffd36a;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { font-family:'Pretendard',system-ui,sans-serif; background:var(--bg); color:var(--ink);
    height:100vh; overflow:hidden; word-break:keep-all; -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; }
  button { font-family:inherit; cursor:pointer; } a { color:inherit; text-decoration:none; }

  .ambient { position:fixed; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(60% 55% at 50% 0%, var(--acc-soft), transparent 60%), linear-gradient(180deg,var(--bg-2),var(--bg)); }
  .scanlines { position:fixed; inset:0; z-index:40; pointer-events:none; opacity:.25;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px); }

  /* HUD */
  .hud { position:relative; z-index:6; display:flex; align-items:center; justify-content:space-between; gap:14px; padding:14px 22px; flex:none; }
  .hud-l, .hud-r { display:flex; align-items:center; gap:12px; }
  .back { display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:700; color:var(--ink-2);
    background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:9px 14px; transition:.15s; }
  .back:hover { color:var(--ink); border-color:var(--acc-2); }
  .title { display:flex; align-items:baseline; gap:10px; }
  .title h1 { margin:0; font-size:19px; font-weight:800; letter-spacing:-.02em; }
  .title .tag { font-family:var(--mono); font-size:11px; color:var(--ink-3); }
  .chip { font-family:var(--mono); font-size:12px; font-weight:700; padding:6px 11px; border-radius:9px;
    background:var(--panel); border:1px solid var(--line); color:var(--ink-2); }
  .chip b { color:var(--ink); }
  .chip.live { color:#04140c; background:var(--green); border-color:var(--green); }
  .chip.idle { color:var(--ink-3); }

  /* 메인 — [영상 | 패널]을 한 덩어리로 가운데 정렬, 사이 간격 고정 */
  .wrap { position:relative; z-index:5; flex:1; min-height:0; display:flex; gap:18px; padding:0 22px 16px; align-items:stretch; justify-content:center; }
  .stagecol { flex:0 1 auto; min-width:0; display:flex; align-items:center; justify-content:center; }
  .viewport { position:relative; aspect-ratio:var(--ar, 4 / 3); height:100%; width:auto; max-width:100%; max-height:100%;
    border-radius:20px; overflow:hidden; background:#05060c;
    border:1px solid var(--line-2); box-shadow:0 0 0 1px rgba(59,134,255,.15), 0 30px 70px rgba(0,0,0,.55); }
  .viewport video, .viewport canvas { position:absolute; inset:0; width:100%; height:100%; }
  .viewport video { object-fit:fill; transform:scaleX(-1); }
  /* 게임 뷰파인더 코너 */
  .corner { position:absolute; width:30px; height:30px; border:3px solid var(--acc-2); z-index:3; pointer-events:none; opacity:.85; }
  .corner.tl{top:14px;left:14px;border-right:0;border-bottom:0;border-radius:8px 0 0 0;}
  .corner.tr{top:14px;right:14px;border-left:0;border-bottom:0;border-radius:0 8px 0 0;}
  .corner.bl{bottom:14px;left:14px;border-right:0;border-top:0;border-radius:0 0 0 8px;}
  .corner.br{bottom:14px;right:14px;border-left:0;border-top:0;border-radius:0 0 8px 0;}

  /* 시작 오버레이 */
  .cover { position:absolute; inset:0; z-index:5; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    background:radial-gradient(70% 60% at 50% 40%, rgba(59,134,255,.12), transparent), rgba(5,6,12,.85); text-align:center; padding:24px; }
  .cover.hide { display:none; }
  .cover .big { font-size:54px; }
  .cover p { margin:0; color:var(--ink-2); font-size:13.5px; max-width:340px; line-height:1.6; }
  .startbtn { display:inline-flex; align-items:center; gap:10px; font-size:17px; font-weight:800; color:#fff;
    padding:15px 34px; border:0; border-radius:14px; background:linear-gradient(135deg,var(--acc-2),var(--acc));
    box-shadow:0 12px 30px rgba(59,134,255,.4); transition:transform .15s, filter .15s; }
  .startbtn:hover { transform:translateY(-2px); filter:brightness(1.06); }
  .startbtn.loading { opacity:.7; pointer-events:none; }

  /* 사이드 패널 — 영상과 같은 높이로 꽉, 탐지목록은 남는 높이를 채움 */
  .side { width:360px; flex:none; display:flex; flex-direction:column; gap:16px; align-self:stretch; min-height:0; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:18px; }
  .list-card { flex:1; min-height:0; display:flex; flex-direction:column; }
  .card h2 { margin:0 0 14px; font-size:14px; font-weight:700; color:var(--ink-2); display:flex; align-items:center; justify-content:space-between; }
  .card h2 .cnt { font-family:var(--mono); font-size:24px; font-weight:700; color:var(--acc-2); }
  .det-list { display:flex; flex-direction:column; gap:12px; flex:1; min-height:0; overflow:auto; }
  .empty { color:var(--ink-3); font-size:13px; text-align:center; padding:24px 0; margin:auto; }
  .det-head { display:flex; justify-content:space-between; font-size:14.5px; font-weight:600; margin-bottom:6px; }
  .det-pct { font-family:var(--mono); color:var(--acc-2); }
  .gauge { height:9px; border-radius:99px; background:rgba(255,255,255,.08); overflow:hidden; }
  .gauge-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--acc),var(--acc-2)); transition:width .2s; }
  .ctrl label { display:flex; justify-content:space-between; font-size:13.5px; color:var(--ink-2); margin-bottom:10px; }
  .ctrl label span { font-family:var(--mono); color:var(--acc-2); }
  .ctrl input[type=range] { width:100%; height:6px; accent-color:var(--acc); }
  .stopbtn { width:100%; margin-top:14px; font-size:14px; font-weight:700; color:var(--ink-2);
    background:rgba(255,255,255,.04); border:1px solid var(--line-2); border-radius:12px; padding:13px; transition:.15s; }
  .stopbtn:hover { color:#fff; border-color:var(--acc-2); }

  @media (max-width:860px){
    .wrap{ flex-direction:column; overflow:auto; }
    .stagecol{ width:100%; }
    .viewport{ width:100%; height:auto; max-height:60vh; }
    .side{ width:100%; flex-direction:row; flex-wrap:wrap; }
    .side .card{ flex:1; min-width:200px; }
  }
</style>
</head>
<body>

<div class="ambient"></div>
<div class="scanlines"></div>

<header class="hud">
  <div class="hud-l">
    <a class="back" href="/explore.html">← 스테이지</a>
    <div class="title"><h1>🎯 객체 탐지</h1><span class="tag">COCO-SSD · 사전학습</span></div>
  </div>
  <div class="hud-r">
    <span class="chip idle" id="status">● IDLE</span>
    <span class="chip" id="fps">FPS <b>—</b></span>
  </div>
</header>

<main class="wrap">
  <div class="stagecol">
  <div class="viewport" id="viewport">
    <video id="video" playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
    <div class="cover" id="cover">
      <div class="big">🎯</div>
      <p>카메라를 켜면 화면 속 사물을 실시간으로 찾아 박스로 표시해요. 추가 학습은 필요 없어요!</p>
      <button class="startbtn" id="start">▶ 카메라 켜기 · 탐지 시작</button>
      <p style="font-size:11.5px;color:var(--ink-3)">카메라는 이 기기에서만 처리되고 어디에도 전송되지 않아요.</p>
    </div>
  </div>
  </div>

  <aside class="side">
    <div class="card list-card">
      <h2>탐지된 사물 <span class="cnt" id="count">0</span></h2>
      <div class="det-list" id="list"><div class="empty">아직 없어요 — 카메라를 켜보세요</div></div>
    </div>
    <div class="card ctrl">
      <label>탐지 민감도 <span id="thrv">50%</span></label>
      <input type="range" id="thr" min="10" max="90" value="50" />
      <button class="stopbtn" id="stop">⏹ 카메라 끄기</button>
    </div>
  </aside>
</main>

<script>
  const $ = (id)=>document.getElementById(id);
  const els = { video:$('video'), overlay:$('overlay'), cover:$('cover'), start:$('start'), stop:$('stop'),
    status:$('status'), fps:$('fps'), count:$('count'), list:$('list'), thr:$('thr'), thrv:$('thrv'), viewport:$('viewport') };
  const detect = { model:null, stream:null, raf:null, lastT:0, threshold:0.5 };

  els.thr.addEventListener('input', ()=>{ detect.threshold=(+els.thr.value)/100; els.thrv.textContent=els.thr.value+'%'; });
  els.start.addEventListener('click', startCam);
  els.stop.addEventListener('click', stopCam);

  function setStatus(t, cls){ els.status.textContent='● '+t; els.status.className='chip '+(cls||''); }
  function setAR(){ const vw=els.video.videoWidth, vh=els.video.videoHeight;
    if (vw && vh) els.viewport.style.setProperty('--ar', vw + ' / ' + vh); }

  async function startCam(){
    if (detect.stream) return;
    if (!window.cocoSsd){ setStatus('ERROR','idle'); return; }
    els.start.classList.add('loading'); els.start.textContent='모델 불러오는 중…'; setStatus('LOADING');
    try {
      if (!detect.model) detect.model = await cocoSsd.load();
      detect.stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' } });
      els.video.srcObject = detect.stream;
      await els.video.play().catch(()=>{});
      setAR(); els.video.addEventListener('loadedmetadata', setAR, { once:true });
      els.cover.classList.add('hide');
      setStatus('LIVE','live');
      detect.lastT = performance.now();
      loop();
    } catch(e){ console.error('[detect]', e); setStatus('ERROR','idle');
      els.start.classList.remove('loading'); els.start.textContent='▶ 다시 시도'; }
  }

  function stopCam(){
    if (detect.stream){ detect.stream.getTracks().forEach(t=>t.stop()); detect.stream=null; }
    els.video.srcObject=null;
    if (detect.raf) cancelAnimationFrame(detect.raf);
    const ctx=els.overlay.getContext('2d'); ctx.clearRect(0,0,els.overlay.width,els.overlay.height);
    els.cover.classList.remove('hide');
    els.start.classList.remove('loading'); els.start.textContent='▶ 카메라 켜기 · 탐지 시작';
    setStatus('IDLE','idle'); els.fps.innerHTML='FPS <b>—</b>';
    els.count.textContent='0'; els.list.innerHTML='<div class="empty">아직 없어요 — 카메라를 켜보세요</div>';
  }

  async function loop(){
    if (!detect.stream || !detect.model) return;
    if (els.video.readyState >= 2){
      const vw=els.video.videoWidth, vh=els.video.videoHeight;
      els.overlay.width=vw; els.overlay.height=vh; setAR();
      try {
        const preds = (await detect.model.detect(els.video)).filter(p=>p.score>=detect.threshold);
        const ctx=els.overlay.getContext('2d'); ctx.clearRect(0,0,vw,vh);
        ctx.font='bold 16px JetBrains Mono';
        preds.forEach(p=>{
          const [x,y,w,h]=p.bbox, mx=vw-x-w; // 비디오가 좌우 반전 표시되므로 박스 X만 반전
          ctx.strokeStyle='#00ff88'; ctx.lineWidth=3; ctx.strokeRect(mx,y,w,h);
          const label=`${p.class} ${Math.round(p.score*100)}%`, tw=ctx.measureText(label).width;
          ctx.fillStyle='#00ff88'; ctx.fillRect(mx, y-20, tw+10, 20);
          ctx.fillStyle='#000'; ctx.fillText(label, mx+5, y-5);
        });
        els.count.textContent=preds.length;
        els.list.innerHTML = preds.length ? preds.slice(0,8).map(p=>{
          const pct=Math.round(p.score*100);
          return `<div class="det-row"><div class="det-head"><span>${p.class}</span><span class="det-pct">${pct}%</span></div>
            <div class="gauge"><div class="gauge-fill" style="width:${pct}%"></div></div></div>`;
        }).join('') : '<div class="empty">사물이 안 보여요 — 카메라 앞에 물건을 비춰보세요</div>';
        const now=performance.now(), fps=1000/(now-detect.lastT); detect.lastT=now;
        els.fps.innerHTML='FPS <b>'+fps.toFixed(1)+'</b>';
      } catch(e){ /* skip frame */ }
    }
    detect.raf=requestAnimationFrame(loop);
  }

  window.addEventListener('keydown',(e)=>{ if(e.key==='Escape') location.href='/explore.html'; });
  window.addEventListener('pagehide', stopCam);
  window.addEventListener('pageshow',()=>{ document.body.style.opacity='1'; });
</script>
</body>
</html>
