<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="/favicon.png" />
<meta name="theme-color" content="#0a0b12" />
<title>직접 제작 · VISION AI</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg:#0a0b12; --bg-2:#120f14;
    --ink:#f2f4fb; --ink-2:#cdb6bd; --ink-3:#9c7d84;
    --line:rgba(255,255,255,.10); --line-2:rgba(255,255,255,.16);
    --panel:rgba(255,255,255,.045);
    --acc:#ff5747; --acc-2:#ff8472; --acc-soft:rgba(255,87,71,.18);
    --green:#42e29b;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { font-family:'Pretendard',system-ui,sans-serif; background:var(--bg); color:var(--ink);
    height:100vh; overflow:hidden; word-break:keep-all; -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; }
  a { color:inherit; text-decoration:none; } button { font-family:inherit; cursor:pointer; }

  .ambient { position:fixed; inset:0; z-index:0; pointer-events:none; transition:background .5s;
    background:radial-gradient(60% 60% at 50% 18%, var(--acc-soft), transparent 60%),
               radial-gradient(50% 50% at 85% 92%, rgba(255,132,114,.08), transparent 62%),
               linear-gradient(180deg, var(--bg-2), var(--bg)); }
  .ambient::after { content:''; position:absolute; inset:0;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:48px 48px; opacity:.18;
    -webkit-mask-image:radial-gradient(circle at 50% 40%, #000 0%, transparent 78%);
            mask-image:radial-gradient(circle at 50% 40%, #000 0%, transparent 78%); }
  .scanlines { position:fixed; inset:0; z-index:40; pointer-events:none; opacity:.3;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px); }

  .hud { position:relative; z-index:6; display:flex; align-items:center; justify-content:space-between; padding:16px 26px; gap:14px; flex:none; }
  .hud-brand { display:flex; align-items:center; gap:11px; }
  .hud-brand img { height:26px; display:block; }
  .hud-brand .bt { font-size:14px; font-weight:800; } .hud-brand .bt span { color:#f0473a; }
  .hud-brand .sep { width:1px; height:16px; background:var(--line-2); }
  .hud-brand .sys { font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.16em; color:var(--ink-3); }
  .hud-right { display:flex; align-items:center; gap:10px; }
  .hud-clock { font-family:var(--mono); font-size:13px; font-weight:700; color:var(--ink-2); }
  .hud-btn { display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:700; color:var(--ink-2);
    background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:8px 12px; transition:.15s; }
  .hud-btn:hover { color:var(--ink); border-color:var(--line-2); background:rgba(255,255,255,.08); }

  .stage { position:relative; z-index:5; flex:1; display:flex; flex-direction:column; align-items:center; min-height:0; }
  .crumb { display:inline-flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11px; letter-spacing:.18em;
    color:var(--ink-3); text-transform:uppercase; background:rgba(255,255,255,.04); border:1px solid var(--line);
    border-radius:999px; padding:6px 14px; margin:2px 0 0; }
  .crumb b { color:var(--acc-2); }
  .stage-title { font-size:29px; font-weight:800; letter-spacing:-.02em; margin:12px 0 4px;
    text-shadow:0 2px 26px rgba(255,87,71,.4); }
  .stage-title b { color:var(--acc-2); }

  /* ── 제작팩 캐러셀 ── */
  .carousel { position:relative; width:100%; flex:1; min-height:0; }
  .track { position:absolute; inset:0; }
  .pack { position:absolute; top:50%; left:50%; width:min(430px,76vw); aspect-ratio:3/4;
    transform:translate(calc(-50% + var(--off,0) * var(--gap,230px)), -50%) scale(var(--sc,.8));
    opacity:var(--op,0); filter:var(--bl,none); z-index:var(--z,1);
    transition:transform .45s cubic-bezier(.2,.7,.2,1), opacity .45s, filter .45s;
    border:0; padding:0; background:none; pointer-events:var(--pe,none); }
  .pack-inner { position:relative; width:100%; height:100%; border-radius:18px; overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.6); transition:box-shadow .4s; }
  .pack.center { cursor:pointer; }
  .pack.center .pack-inner { box-shadow:0 40px 110px rgba(0,0,0,.72); }
  .pack.center:hover .pack-inner { box-shadow:0 46px 120px rgba(0,0,0,.78); }
  .pack-art { position:absolute; inset:0; background:radial-gradient(120% 70% at 30% 12%, var(--c1), transparent 60%), linear-gradient(165deg, var(--c2), #0c1120); }
  .pack-art::after { content:''; position:absolute; inset:0; background-image:radial-gradient(rgba(255,255,255,.5) 1px,transparent 1px); background-size:18px 18px; opacity:.06; }
  .pack-thumb { position:absolute; inset:0; z-index:1; width:100%; height:100%; object-fit:cover; }
  .pack-scrim { position:absolute; inset:0; z-index:2;
    background:linear-gradient(180deg, rgba(8,9,15,.15) 28%, rgba(8,9,15,.5) 58%, rgba(8,9,15,.92) 100%); }
  .pack.has-thumb .pack-ic { display:none; }
  .pack-body { position:absolute; inset:0; z-index:3; padding:22px; display:flex; flex-direction:column; }
  .pack-no { font-family:var(--mono); font-size:13px; font-weight:700; color:rgba(255,255,255,.5); }
  .pack-ic { font-size:72px; line-height:1; margin:auto; filter:drop-shadow(0 6px 18px rgba(0,0,0,.55)); }
  .pack-name { font-size:23px; font-weight:800; letter-spacing:-.02em; color:#fff; text-shadow:0 2px 12px rgba(0,0,0,.6); }
  .pack-badge { font-family:var(--mono); font-size:10.5px; font-weight:700; color:#fff; opacity:.85; margin-top:4px; }
  .cbrand { display:flex; align-items:center; justify-content:center; gap:9px; margin-top:6px;
    font-size:20px; font-weight:800; letter-spacing:.01em; color:rgba(255,255,255,.6); }
  .cbrand img { height:19px; opacity:.85; }
  .cbrand b { color:#f0473a; }

  .arrow { position:absolute; top:50%; transform:translateY(-50%); z-index:8; width:auto; height:auto; padding:14px; border:0; background:none;
    color:rgba(255,255,255,.45); font-size:46px; line-height:0; font-weight:300; transition:color .15s, transform .15s; }
  .arrow:hover { color:#fff; }
  .arrow.left { left:max(6px, 2vw); } .arrow.left:hover { transform:translateY(-50%) translateX(-3px); }
  .arrow.right { right:max(6px, 2vw); } .arrow.right:hover { transform:translateY(-50%) translateX(3px); }

  .foot { position:relative; z-index:6; flex:none; display:flex; flex-direction:column; align-items:center; gap:11px; padding:6px 20px 22px; }
  .infobar { display:inline-flex; align-items:center; gap:10px; font-size:13.5px; }
  .infobar .ib-tag { font-family:var(--mono); font-size:11px; font-weight:700; color:var(--acc-2); letter-spacing:.04em; }
  .infobar .nm { font-weight:800; } .infobar .tg { color:var(--ink-3); font-family:var(--mono); font-size:11.5px; }
  .enter { display:inline-flex; align-items:center; gap:9px; font-size:18px; font-weight:800; letter-spacing:.01em; color:#fff;
    padding:6px 4px; border:0; background:none; cursor:pointer; transition:gap .15s; }
  .enter:hover { gap:13px; }
  .dots { display:flex; gap:7px; }
  .dots i { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.22); transition:.2s; cursor:pointer; }
  .dots i.on { background:#fff; width:20px; border-radius:99px; }
  .flowhint { font-size:11.5px; color:var(--ink-3); margin-top:2px; }
  .flowhint b { color:var(--ink-2); font-weight:700; }
  .legend { font-size:11.5px; color:var(--ink-3); margin-top:1px; }
  .legend kbd { font-family:var(--mono); font-size:10.5px; color:var(--ink); background:rgba(255,255,255,.07);
    border:1px solid var(--line-2); border-radius:5px; padding:2px 6px; }

  @media (max-width:560px){ .arrow{width:42px;height:42px;font-size:18px;} .enter{padding:13px 30px;font-size:15px;} }
</style>
</head>
<body>

<div class="ambient" id="ambient"></div>
<div class="scanlines"></div>

<header class="hud">
  <a class="hud-brand" href="/studio.html" onclick="try{sessionStorage.setItem(String.fromCharCode(118,111,115,95,112,97,115,115),String(1))}catch(e){}">
    <img src="/platform/img/logo-mark.webp" alt="Eduino AI" />
    <span class="bt">Eduino <span>AI</span></span>
    <span class="sep"></span><span class="sys">VISION&nbsp;AI</span>
  </a>
  <div class="hud-right">
    <span class="hud-clock" id="clock">--:--</span>
    <button class="hud-btn" id="sound-toggle">🔊 사운드</button>
    <a class="hud-btn" href="/studio.html" onclick="try{sessionStorage.setItem(String.fromCharCode(118,111,115,95,112,97,115,115),String(1))}catch(e){}">← 콘솔</a>
  </div>
</header>

<main class="stage">
  <div class="crumb">VISION AI <span>›</span> <b>TRACK 02 · 직접 제작</b></div>
  <h1 class="stage-title">만들 <b>미션</b>을 골라 시작하세요</h1>

  <div class="carousel">
    <button class="arrow left" id="prev" aria-label="이전">‹</button>
    <div class="track" id="track"></div>
    <button class="arrow right" id="next" aria-label="다음">›</button>
  </div>
</main>

<footer class="foot">
  <button class="enter" id="enter">미션 시작 <span style="color:var(--acc-2);font-weight:400;font-size:20px">→</span></button>
  <div class="dots" id="dots"></div>
</footer>

<script>
  const FEATURES = [
    { key:'image', ic:'🖼️', name:'이미지 분류', badge:'MobileNet · 전이학습', tag:'사진을 분류하는 나만의 AI',
      c1:'rgba(255,87,71,.5)',   c2:'#3a1620', href:'/index.html#image', ready:true },
    { key:'audio', ic:'🎙️', name:'음성 분류', badge:'Speech Commands', tag:'소리·단어를 분류하는 AI',
      c1:'rgba(255,150,90,.45)', c2:'#3a2516', href:'/index.html#audio', ready:true },
    { key:'pose',  ic:'🤸', name:'동작 분류', badge:'MoveNet · 키포인트', tag:'몸 동작을 분류하는 AI',
      c1:'rgba(255,110,150,.45)', c2:'#3a1626', href:'/index.html#pose', ready:true },
  ];

  const track = document.getElementById('track');
  track.innerHTML = FEATURES.map((s,i)=>`
    <button class="pack" data-i="${i}" style="--c1:${s.c1};--c2:${s.c2}">
      <div class="pack-inner">
        <div class="pack-art"></div>
        <img class="pack-thumb" data-base="/platform/img/make-${s.key}" alt="" decoding="async" />
        <div class="pack-scrim"></div>
        <div class="pack-body">
          <div class="pack-no">MISSION ${String(i+1).padStart(2,'0')}</div>
          <div class="pack-ic">${s.ic}</div>
          <div class="pack-name">${s.name}</div>
          <div class="pack-badge">${s.badge}</div>
        </div>
      </div>
    </button>`).join('');
  const packs = [...track.querySelectorAll('.pack')];
  /* 포스터 썸네일 로더 — webp→jpg→png 순 시도, 없으면 그라데이션+아이콘 폴백 */
  packs.forEach(p=>{
    const img=p.querySelector('.pack-thumb'); if(!img) return;
    const base=img.dataset.base, exts=['webp','jpg','png','jpeg']; let k=0;
    const next=()=>{ if(k>=exts.length){ img.remove(); return; } img.src=base+'.'+exts[k++]; };
    img.addEventListener('error', next);
    img.addEventListener('load', ()=>p.classList.add('has-thumb'));
    next();
  });
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = FEATURES.map((_,i)=>`<i data-i="${i}"></i>`).join('');
  const dots = [...dotsEl.querySelectorAll('i')];
  let cur = 0;

  let actx=null, soundOn=true;
  function beep(f,d=0.06,t='triangle',g=0.045){ if(!soundOn) return;
    try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
      const o=actx.createOscillator(),ga=actx.createGain(); o.type=t; o.frequency.value=f; ga.gain.value=g;
      o.connect(ga); ga.connect(actx.destination); const n=actx.currentTime;
      ga.gain.setValueAtTime(g,n); ga.gain.exponentialRampToValueAtTime(0.0001,n+d); o.start(n); o.stop(n+d);
    }catch(e){} }
  const sMove=()=>beep(520,0.05,'triangle',0.04);
  const sGo=()=>{ beep(660,0.09,'square',0.05); setTimeout(()=>beep(990,0.12,'square',0.05),80); };

  function gap(){ return Math.min(400, window.innerWidth*0.4); }
  function render(){
    const g = gap();
    packs.forEach((p,i)=>{
      const off = i - cur, a = Math.abs(off);
      p.style.setProperty('--gap', g+'px');
      p.style.setProperty('--off', off);
      p.style.setProperty('--sc', off===0 ? 1 : (a===1?0.82:0.66));
      p.style.setProperty('--op', a>2 ? 0 : (off===0?1:0.48));
      p.style.setProperty('--bl', 'none');
      p.style.setProperty('--z', 10 - a);
      p.style.setProperty('--pe', a<=2 ? 'auto' : 'none');
      p.classList.toggle('center', off===0);
    });
    dots.forEach((d,i)=>d.classList.toggle('on', i===cur));
  }
  function go(d){ cur=(cur+d+FEATURES.length)%FEATURES.length; render(); sMove(); }
  function to(i){ if(i===cur) return; cur=i; render(); sMove(); }
  function enter(){ sGo(); const href=FEATURES[cur].href;
    document.body.style.transition='opacity .25s'; document.body.style.opacity='0';
    setTimeout(()=>{ location.href=href; },230); }

  packs.forEach((p,i)=>p.addEventListener('click',()=>{ i===cur ? enter() : to(i); }));
  dots.forEach((d,i)=>d.addEventListener('click',()=>to(i)));
  document.getElementById('prev').addEventListener('click',()=>go(-1));
  document.getElementById('next').addEventListener('click',()=>go(1));
  document.getElementById('enter').addEventListener('click',enter);
  document.addEventListener('keydown',(e)=>{
    if(e.key==='ArrowRight'){e.preventDefault();go(1);}
    else if(e.key==='ArrowLeft'){e.preventDefault();go(-1);}
    else if(e.key==='Enter'||e.key===' '){e.preventDefault();enter();}
    else if(e.key==='Escape'){location.href='/studio.html';}
  });
  let sx=null;
  track.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
  track.addEventListener('touchend',e=>{ if(sx==null)return; const dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)>40) go(dx<0?1:-1); sx=null; });
  window.addEventListener('resize', render);

  const st=document.getElementById('sound-toggle');
  st.addEventListener('click',()=>{ soundOn=!soundOn; st.textContent=soundOn?'🔊 사운드':'🔇 사운드'; if(soundOn) beep(700,0.08); });
  function tick(){ const d=new Date(); document.getElementById('clock').textContent=
    String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
  tick(); setInterval(tick,10000);

  render();
  window.addEventListener('pageshow',()=>{ document.body.style.transition='none'; document.body.style.opacity='1'; });
</script>
</body>
</html>
