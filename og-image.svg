  <text x="90" y="320" fill="#ffffff" font-size="78" font-weight="800" letter-spacing="-2">보고 만지며 배우는</text>
  <text x="90" y="412" font-size="78" font-weight="800" letter-spacing="-2"><tspan fill="url(#hl)">AI 수업</tspan><tspan fill="#ffffff">, 6개 코스</tspan></text>
  <!-- 서브 -->
  <text x="92" y="478" fill="#aeb4c6" font-size="26" font-weight="500">설치 없이 브라우저에서 바로 · On-Device · 교실용 체험 학습</text>
  <!-- 칩 -->
  <g font-size="22" font-weight="700">
    <g transform="translate(90,520)"><rect width="190" height="50" rx="25" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/><text x="95" y="33" fill="#ffd9d1" text-anchor="middle">🎥 비전 · 제스처</text></g>
    <g transform="translate(296,520)"><rect width="210" height="50" rx="25" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/><text x="105" y="33" fill="#ffd9d1" text-anchor="middle">📊 데이터 · 텍스트</text></g>
    <g transform="translate(522,520)"><rect width="200" height="50" rx="25" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.14"/><text x="100" y="33" fill="#ffd9d1" text-anchor="middle">🔍 생활 · 개념</text></g>
