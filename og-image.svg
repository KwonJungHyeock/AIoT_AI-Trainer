<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Pretendard, 'Apple SD Gothic Neo', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14161f"/><stop offset="0.6" stop-color="#1b1411"/><stop offset="1" stop-color="#23101a"/>
    </linearGradient>
    <radialGradient id="a1" cx="0.18" cy="0.2" r="0.5"><stop offset="0" stop-color="#f0473a" stop-opacity="0.55"/><stop offset="1" stop-color="#f0473a" stop-opacity="0"/></radialGradient>
    <radialGradient id="a2" cx="0.85" cy="0.15" r="0.5"><stop offset="0" stop-color="#ff8a3d" stop-opacity="0.45"/><stop offset="1" stop-color="#ff8a3d" stop-opacity="0"/></radialGradient>
    <radialGradient id="a3" cx="0.7" cy="0.95" r="0.55"><stop offset="0" stop-color="#7c6cff" stop-opacity="0.40"/><stop offset="1" stop-color="#7c6cff" stop-opacity="0"/></radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff7a64"/><stop offset="1" stop-color="#e8392b"/></linearGradient>
    <linearGradient id="hl" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff9a3d"/><stop offset="0.55" stop-color="#f0473a"/><stop offset="1" stop-color="#ff6ab5"/></linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#a1)"/>
  <rect width="1200" height="630" fill="url(#a2)"/>
  <rect width="1200" height="630" fill="url(#a3)"/>
  <!-- 미세 그리드 -->
  <g stroke="#ffffff" stroke-opacity="0.05">
    <path d="M0 105H1200M0 210H1200M0 315H1200M0 420H1200M0 525H1200"/>
    <path d="M150 0V630M300 0V630M450 0V630M600 0V630M750 0V630M900 0V630M1050 0V630"/>
  </g>
  <!-- 브랜드 -->
  <g transform="translate(90,86)">
    <rect width="62" height="62" rx="16" fill="url(#mark)"/>
    <g fill="#fff"><rect x="18" y="15" width="9" height="32" rx="2"/><rect x="18" y="15" width="26" height="9" rx="2"/><rect x="18" y="26.5" width="21" height="9" rx="2"/><rect x="18" y="38" width="26" height="9" rx="2"/></g>
    <text x="80" y="30" fill="#ffffff" font-size="30" font-weight="800">Eduino <tspan fill="#ff8a6f">AI</tspan></text>
    <text x="80" y="55" fill="#c3ccd9" font-size="18" font-weight="600">체험형 AI 학습 플랫폼</text>
